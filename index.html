/* ===== CRYPTO: AES-256-GCM + PBKDF2 ===== */
// hx: hex string -> Uint8Array
const hx = h => new Uint8Array(h.match(/.{2}/g).map(b => parseInt(b, 16)));
// xh: Uint8Array -> hex string
const xh = a => Array.from(a, b => b.toString(16).padStart(2, '0')).join('');
// ub: Uint8Array/ArrayBuffer -> base64 string
const ub = a => { const u = a instanceof Uint8Array ? a : new Uint8Array(a); return btoa(String.fromCharCode(...u)); };
// bu: base64 string -> Uint8Array
const bu = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function pbkdf2Key(pass, saltU8) {
  const mat = await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: saltU8, iterations: 310000, hash: 'SHA-256' },
    mat, { name: 'AES-GCM', length: 256 }, true, ['encrypt', 'decrypt']
  );
}
async function encAll(key, data) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = new Uint8Array(await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(JSON.stringify(data))));
  const out = new Uint8Array(12 + ct.length); out.set(iv); out.set(ct, 12);
  return ub(out);
}
async function decAll(key, b64) {
  const p = bu(b64);
  return JSON.parse(new TextDecoder().decode(await crypto.subtle.decrypt({ name: 'AES-GCM', iv: p.slice(0, 12) }, key, p.slice(12))));
}

// Ключ хранится в памяти + sessionStorage (очищается при закрытии вкладки)
const _SK = '_ddk_k';
let _memKey = null;
async function getKey() {
  if (_memKey) return _memKey;
  const s = sessionStorage.getItem(_SK); if (!s) return null;
  _memKey = await crypto.subtle.importKey('raw', bu(s), { name: 'AES-GCM', length: 256 }, true, ['encrypt', 'decrypt']);
  return _memKey;
}
async function storeKey(k) {
  _memKey = k;
  sessionStorage.setItem(_SK, ub(new Uint8Array(await crypto.subtle.exportKey('raw', k))));
}
function clearKey() { _memKey = null; sessionStorage.removeItem(_SK); }

/* ===== CLOUD SYNC ===== */
async function fsGet(uid) {
  const d = await _db.collection('u').doc(uid).get();
  return d.exists ? d.data() : null;
}
async function cloudPush(uid, tasks, lists, habits, key, salt) {
  await _db.collection('u').doc(uid).set({
    payload: await encAll(key, { tasks, lists, habits, v: 1 }),
    salt,
    ts: firebase.firestore.FieldValue.serverTimestamp()
  });
}

function chatDocId(a,b){return[a,b].sort().join('_');}
async function ensureProfile(uid,email){
  if(!_db)return;
  try{await _db.collection('profiles').doc(uid).set({uid,email,name:email.split('@')[0]},{merge:true});}catch(e){}
}
async function searchProfileByEmail(email){
  if(!_db)return null;
  const s=await _db.collection('profiles').where('email','==',email.trim().toLowerCase()).limit(1).get();
  return s.empty?null:{...s.docs[0].data(),uid:s.docs[0].id};
}
async function getOrCreateChat(uid1,uid2){
  const cid=chatDocId(uid1,uid2);
  // merge:true → create if not exists, update if exists (не перезаписывает lastMsg)
  await _db.collection('chats').doc(cid).set(
    {participants:[uid1,uid2],lastTs:firebase.firestore.FieldValue.serverTimestamp()},
    {merge:true}
  );
  return cid;
}
async function sendChatMsg(cid,from,type,content){
  const base={type,from,ts:firebase.firestore.FieldValue.serverTimestamp()};
  if(type!=='text')base.status='pending';
  await _db.collection('chats').doc(cid).collection('messages').add({...base,...content});
  const prev=type==='text'?content.text:type==='task'?'📋 Карточка':type==='stack'?'📚 Стопка карточек':'🔄 Совместная привычка';
  await _db.collection('chats').doc(cid).update({lastMsg:prev,lastTs:firebase.firestore.FieldValue.serverTimestamp()});
}
async function setChatMsgStatus(cid,mid,status){
  await _db.collection('chats').doc(cid).collection('messages').doc(mid).update({status});
}
async function createSharedHabitDoc(uid1,uid2,habit){
  const id='sh_'+Date.now();
  await _db.collection('sharedHabits').doc(id).set({
    id,status:'pending',participants:[uid1,uid2],invitedBy:uid1,
    habit:{text:habit.text,colorIdx:habit.colorIdx||0,weekdays:habit.weekdays||[]},
    tracking:{},createdAt:firebase.firestore.FieldValue.serverTimestamp()

  return id;
}

// Merge по id: данные из b перезаписывают a при конфликте
function mergeArr(a, b) {
  const m = new Map();
  (a || []).forEach(x => m.set(x.id, x));
  (b || []).forEach(x => m.set(x.id, x));
  return [...m.values()];
}

function Sparkline({values,color,width=120,height=32}){
  if(!values||values.filter(v=>v>0).length<2)return null;
  const nonzero=values.filter(v=>v>0);
  const max=Math.max(...nonzero);const min=0;const range=max||1;
  const pts=values.map((v,i)=>(i/(values.length-1)*width)+','+(height-(v/range)*(height-4)-2)).join(' ');
  const last=values.length-1;
  const lx=last/(values.length-1)*width;
  const ly=height-(values[last]/range)*(height-4)-2;
  return <svg width={width} height={height} viewBox={'0 0 '+width+' '+height} style={{overflow:'visible'}}>
    <polyline points={pts} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" opacity=".75"/>
    {values[last]>0&&<circle cx={lx} cy={ly} r="3" fill={color}/>}
  </svg>;
}

function PomodoroWidget({habit,date,p,onDone,small=false}){
  const workSec=(habit.widget?.workMin||25)*60;
  const breakSec=(habit.widget?.breakMin||5)*60;
  const maxSess=habit.widget?.sessions||4;
  const[phase,setPhase]=useState('idle');
  const[sec,setSec]=useState(workSec);
  const[sess,setSess]=useState(0);
  const timerRef=useRef(null);
  function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
  function clearT(){if(timerRef.current){clearInterval(timerRef.current);timerRef.current=null;}}
  function startWork(){
    clearT();setPhase('work');
    timerRef.current=setInterval(()=>setSec(s=>{
      if(s<=1){clearT();setSess(n=>{const nx=n+1;if(nx>=maxSess){setPhase('done');setSec(0);if(onDone)onDone();return nx;}setPhase('break');setSec(breakSec);timerRef.current=setInterval(()=>setSec(s2=>{if(s2<=1){clearT();startWork();return 0;}return s2-1;}),1000);return nx;});return 0;}return s-1;}),1000);
  }
  function toggle(){if(timerRef.current){clearT();setPhase('idle');}else{if(phase==='idle'||phase==='work')startWork();}}
  function reset(){clearT();setPhase('idle');setSec(workSec);setSess(0);}
  useEffect(()=>()=>clearT(),[]);
  const running=!!timerRef.current;
  const displaySec=phase==='idle'?workSec:sec;
  const pct=phase==='work'?1-sec/workSec:phase==='break'?1-sec/breakSec:phase==='done'?1:0;
  const col=phase==='break'?'#30d158':phase==='done'?p.dot:p.dot;
  const r=small?14:30;const circ=2*Math.PI*r;

  if(small)return <div style={{display:'flex',alignItems:'center',gap:8,userSelect:'none',WebkitUserSelect:'none'}}>
    <svg width={r*2+6} height={r*2+6} viewBox={'0 0 '+(r*2+6)+' '+(r*2+6)} style={{flexShrink:0}}>
      <circle cx={r+3} cy={r+3} r={r} fill="none" stroke="rgba(128,128,128,.2)" strokeWidth="3"/>
      <circle cx={r+3} cy={r+3} r={r} fill="none" stroke={col} strokeWidth="3" strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} transform={'rotate(-90 '+(r+3)+' '+(r+3)+')'} style={{transition:'stroke-dashoffset .5s'}}/>
    </svg>
    <div style={{minWidth:44}}>
      <div style={{fontSize:15,fontWeight:700,color:p.text,fontVariantNumeric:'tabular-nums'}}>{fmt(displaySec)}</div>
      <div style={{fontSize:10,color:p.sub}}>{phase==='done'?'Готово':phase==='break'?'Перерыв':'Сессия '+(sess+1)+'/'+maxSess}</div>
    </div>
    {phase!=='done'&&<button onPointerDown={e=>e.stopPropagation()} onTouchEnd={e=>{e.preventDefault();e.stopPropagation();toggle();}} onClick={e=>{e.stopPropagation();toggle();}} style={{width:32,height:32,borderRadius:10,background:p.dot,border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',touchAction:'manipulation',WebkitTapHighlightColor:'transparent'}}>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="#fff">{running?<><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></>:<polygon points="5,3 19,12 5,21"/>}</svg>
    </button>}
  </div>;

  return <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14,userSelect:'none',WebkitUserSelect:'none'}}>
    <div style={{position:'relative',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <svg width={r*2+20} height={r*2+20} viewBox={'0 0 '+(r*2+20)+' '+(r*2+20)}>
        <circle cx={r+10} cy={r+10} r={r} fill="none" stroke="rgba(128,128,128,.15)" strokeWidth="6"/>
        <circle cx={r+10} cy={r+10} r={r} fill="none" stroke={col} strokeWidth="6" strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} transform={'rotate(-90 '+(r+10)+' '+(r+10)+')'} style={{transition:'stroke-dashoffset .5s'}}/>
      </svg>
      <div style={{position:'absolute',textAlign:'center'}}>
        <div style={{fontSize:36,fontWeight:700,color:p.text,fontVariantNumeric:'tabular-nums',letterSpacing:'-1px'}}>{fmt(displaySec)}</div>
        <div style={{fontSize:11,color:p.sub,marginTop:1}}>{phase==='done'?'Готово!':phase==='break'?'Перерыв':'сессия '+(sess+1)+'/'+maxSess}</div>
      </div>
    </div>
    <div style={{display:'flex',gap:8}}>
      {phase!=='done'&&<button onPointerDown={e=>e.preventDefault()} onClick={toggle} style={{padding:'10px 22px',borderRadius:14,background:running?'rgba(255,255,255,.1)':p.dot,border:running?'1px solid rgba(255,255,255,.2)':'none',color:running?p.sub:'#fff',fontSize:15,fontWeight:600,cursor:'pointer',touchAction:'manipulation'}}>{running?'Пауза':'Старт'}</button>}
      {(sess>0||phase!=='idle')&&<button onPointerDown={e=>e.preventDefault()} onClick={reset} style={{padding:'10px 16px',borderRadius:14,background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.12)',color:p.sub,fontSize:15,cursor:'pointer',touchAction:'manipulation'}}>↻</button>}
    </div>
    <div style={{display:'flex',gap:6}}>{Array.from({length:maxSess},(_,i)=><div key={i} style={{width:8,height:8,borderRadius:'50%',background:i<sess?p.dot:'rgba(128,128,128,.2)',transition:'background .3s'}}/>)}</div>
  </div>;
}

function TinderStack({items,onRight,onLeft,onUp,onTap,renderCard,shufflePhase,leftLabel='Позже',leftColor='#ff3b30'}){
  const cardRef=useRef(null);
  const[dx,setDx]=useState(0);
  const[dy,setDy]=useState(0);
  // Use refs for reliable tap detection - state updates are async so closures see stale values
  const dxRef=useRef(0);
  const dyRef=useRef(0);
  const stRef=useRef(null);
  const[fly,setFly]=useState(null);
  const{dark}=useT();
  const P=dark?PD:PL;
  const pof=n=>P[Math.min(Math.max(n||0,0),P.length-1)];
  const top=items[0],sec=items[1],thr=items[2];
  const busy=!!shufflePhase||!!fly;
  const FAN=[
    {r:-11,x:-34,y:12},
    {r:-6,x:-18,y:6},
    {r:0,x:0,y:0},
    {r:6,x:18,y:6},
    {r:11,x:34,y:12},
  ];

  function dn(e){
    if(busy)return;
    // Don't start drag if touching an interactive element
    const t=e.target||e.srcElement;
    if(isInteractiveEl(t))return;
    const x=e.clientX??e.touches?.[0]?.clientX;
    const y=e.clientY??e.touches?.[0]?.clientY;
    stRef.current={x,y};
    dxRef.current=0; dyRef.current=0;
    setDx(0); setDy(0);
  }
  function mv(e){
    if(!stRef.current||busy)return;
    const nx=(e.clientX??e.touches?.[0]?.clientX)-stRef.current.x;
    const ny=(e.clientY??e.touches?.[0]?.clientY)-stRef.current.y;
    dxRef.current=nx; dyRef.current=ny;
    setDx(nx); setDy(ny);
  }
  function up(){
    if(!stRef.current)return;
    const cx=dxRef.current, cy=dyRef.current;
    stRef.current=null;
    if(cx>65)doFly('right');
    else if(cx<-65)doFly('left');
    else if(cy<-65&&Math.abs(cx)<60&&onUp)fly_up();
    else{
      if(Math.abs(cx)<12&&Math.abs(cy)<12&&onTap)onTap(top);
      dxRef.current=0; dyRef.current=0;
      setDx(0); setDy(0);
    }
  }
  function doFly(dir){setFly(dir);dxRef.current=0;dyRef.current=0;setDx(0);setDy(0);setTimeout(()=>{if(dir==='right')onRight(top);else onLeft(top);setFly(null);},360);}
  function fly_up(){setFly('up');dxRef.current=0;dyRef.current=0;setDx(0);setDy(0);setTimeout(()=>{if(onUp)onUp(top);setFly(null);},340);}
  // Non-passive touchmove so preventDefault works on mobile (prevents page scroll during swipe)
  useEffect(()=>{
    const el=cardRef.current;
    if(!el)return;
    const handler=e=>{
      const t=e.target;
      // Don't intercept touches on interactive elements
      if(isInteractiveEl(t))return;
      if(e.touches[0]&&stRef.current){e.preventDefault();mv(e.touches[0]);}
    };
    el.addEventListener('touchmove',handler,{passive:false});
    return()=>el.removeEventListener('touchmove',handler);
  },[!!top,!!shufflePhase]);

  if(!top)return null;
  const cp=pof(top.colorIdx);
  const drag=!!stRef.current&&!busy;

  if(shufflePhase){
    const fi=items.slice(0,Math.min(items.length,5));
    const isFan=shufflePhase==='fan';
    return <div style={{position:'relative',width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}>
      {fi.map((item,i)=>{
        const n=fi.length===1?2:Math.round(i*(4/Math.max(fi.length-1,1)));
        const f=FAN[n]||FAN[2];
        const p2=pof(item.colorIdx);
        return <div key={item.id} style={{
          position:'absolute',width:'84%',height:'84%',borderRadius:26,background:p2.bg,
          boxShadow:'0 12px 40px rgba(0,0,0,.18)',
          transform:isFan?('rotate('+f.r+'deg) translateX('+f.x+'px) translateY('+f.y+'px) scale(.93)'):'rotate(0deg) translateX(0px) translateY(0px) scale(1)',
          transition:isFan?'transform .55s cubic-bezier(.4,0,.2,1)':'transform .45s cubic-bezier(.4,0,.2,1)',
          zIndex:fi.length-i,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',
        }}>
          {i===0&&<div style={{fontSize:15,fontWeight:700,color:p2.text,padding:'0 22px',textAlign:'center',opacity:isFan?1:0,transition:'opacity .2s .1s'}}>{item.text}</div>}
        </div>;
      })}
    </div>;
  }

  return <div style={{position:'relative',width:'100%',height:'100%',userSelect:'none'}}>
    {thr&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
      <div style={{width:'calc(100% - 44px)',height:'100%',borderRadius:28,background:pof(thr.colorIdx).bg,transform:'scale(.88) translateY('+(drag?-12:0)+'px)',transition:drag?'none':'transform .3s ease'}}/>
    </div>}
    {sec&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
      <div style={{width:'calc(100% - 22px)',height:'100%',borderRadius:28,background:pof(sec.colorIdx).bg,transform:'scale(.94) translateY('+(drag?-20:0)+'px)',transition:drag?'none':'transform .3s ease',boxShadow:'0 4px 24px rgba(0,0,0,.12)'}}/>
    </div>}
    <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div ref={cardRef} onMouseDown={dn} onMouseMove={mv} onMouseUp={up} onMouseLeave={()=>{if(stRef.current){const cx=dxRef.current,cy=dyRef.current;stRef.current=null;if(cx>65)doFly('right');else if(cx<-65)doFly('left');else if(cy<-65&&Math.abs(cx)<60&&onUp)fly_up();else{dxRef.current=0;dyRef.current=0;setDx(0);setDy(0);}}}}
        onTouchStart={e=>dn(e.touches[0])} onTouchEnd={up}
        style={{width:'100%',height:'100%',borderRadius:28,background:cp.bg,
          touchAction:'none',WebkitUserSelect:'none',userSelect:'none',
          boxShadow:dx>40?'0 18px 52px rgba(48,209,88,.24)':dx<-40?'0 18px 52px rgba(255,59,48,.2)':'0 16px 52px rgba(0,0,0,.15)',
          cursor:fly?'default':'grab',position:'relative',overflow:'hidden',
          transform:fly==='right'?'translateX(160vw) rotate(26deg)':fly==='left'?'translateX(-160vw) rotate(-26deg)':fly==='up'?'translateY(-120vh) scale(.8)':('translateX('+dx+'px) translateY('+(dy*.08)+'px) rotate('+(dx*.05)+'deg)'),
          transition:fly||!stRef.current?'transform .34s cubic-bezier(.25,.46,.45,.94),box-shadow .15s':'box-shadow .15s',
        }}>
        {dx>30&&<div style={{position:'absolute',inset:0,borderRadius:28,background:'rgba(48,209,88,.1)',display:'flex',alignItems:'flex-start',justifyContent:'flex-end',padding:20,pointerEvents:'none',opacity:Math.min((dx-30)/60,1)}}>
          <div style={{background:'#30d158',borderRadius:50,padding:'7px 14px',display:'flex',alignItems:'center',gap:6}}><IcCheck c="#fff" s={14} sw={2.5}/><span style={{color:'#fff',fontSize:13,fontWeight:700}}>Готово</span></div>
        </div>}
        {dx<-30&&<div style={{position:'absolute',inset:0,borderRadius:28,background:'rgba(255,59,48,.08)',display:'flex',alignItems:'flex-start',justifyContent:'flex-start',padding:20,pointerEvents:'none',opacity:Math.min((-dx-30)/60,1)}}>
          <div style={{background:leftColor,borderRadius:50,padding:'7px 14px',display:'flex',alignItems:'center',gap:6}}><IcX c="#fff" s={14} sw={2.5}/><span style={{color:'#fff',fontSize:13,fontWeight:700}}>{leftLabel}</span></div>
        </div>}
        {renderCard(top,dx)}
      </div>
    </div>
  </div>;
}

/* ===== DAY STRIP ===== */
function DayStrip({habit,dates30,onToggle}){
  const{dark}=useT();
  const P=dark?PD:PL;
  const p=P[Math.min(Math.max(habit.colorIdx||0,0),P.length-1)];
  const tday=tod();
  const ref=useRef(null);
  useEffect(()=>{if(ref.current)ref.current.scrollLeft=ref.current.scrollWidth;},[]);
  return <div ref={ref} style={{display:'flex',gap:3,overflowX:'auto',paddingBottom:2,paddingRight:16,scrollbarWidth:'none',msOverflowStyle:'none'}} onTouchStart={e=>e.stopPropagation()} onTouchMove={e=>e.stopPropagation()}>
    {dates30.map((date,i)=>{
      const dd=habit.days?.find(x=>x.date===date);const ddState=dd?.state||null;
      const isT=date===tday;
      const d=new Date(date);
      const showM=i===0||new Date(dates30[i-1]).getMonth()!==d.getMonth();
      return <div key={date} style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0,width:26}}>
        <div style={{fontSize:7,fontWeight:700,color:p.sub,height:10,display:'flex',alignItems:'center',opacity:showM?.9:0,textTransform:'uppercase'}}>{showM?MOS[d.getMonth()]:''}</div>
        <div style={{fontSize:8,color:isT?p.text:p.sub,fontWeight:isT?700:400,marginBottom:1,lineHeight:1}}>{WD[d.getDay()]}</div>
        <div onClick={()=>onToggle(habit.id,date)} style={{width:22,height:22,borderRadius:6,cursor:'pointer',flexShrink:0,border:'1.5px solid '+(ddState==='done'?p.dot:ddState==='failed'?'#ff453a':dd?.value>0?p.dot+'80':'rgba(128,128,128,.18)'),background:ddState==='done'?p.dot:ddState==='failed'?'rgba(255,69,58,.85)':dd?.value>0?(p.dot+'22'):dark?'rgba(255,255,255,.04)':'rgba(255,255,255,.4)',display:'flex',alignItems:'center',justifyContent:'center',outline:isT?'2px solid '+(ddState==='failed'?'#ff453a':p.dot):'none',outlineOffset:1,transition:'all .15s'}}>
          {ddState==='done'&&!dd?.value&&<IcCheck c="#fff" s={9} sw={2.5}/>}
          {ddState==='done'&&dd?.value>0&&<span style={{fontSize:7,fontWeight:700,color:'#fff',lineHeight:1}}>{dd.value>99?'99+':Math.round(dd.value)}</span>}
          {ddState==='failed'&&<IcX c="#fff" s={8} sw={2.5}/>}
          {!ddState&&dd?.value>0&&<span style={{fontSize:7,fontWeight:700,color:p.text,lineHeight:1}}>{dd.value>99?'99+':Math.round(dd.value)}</span>}
        </div>
      </div>;
    })}
  </div>;
}

/* ===== CALENDAR ===== */
function CalModal({habit,onClose,onToggle}){
  const{T,dark}=useT();
  const P=dark?PD:PL;
  const p=P[Math.min(Math.max(habit.colorIdx||0,0),P.length-1)];
  const tday=tod();
  const now=new Date();
  const[yr,setYr]=useState(now.getFullYear());
  const[mo,setMo]=useState(now.getMonth());
  const canNext=!(yr===now.getFullYear()&&mo===now.getMonth());
  const fd=new Date(yr,mo,1).getDay();
  const dim=new Date(yr,mo+1,0).getDate();
  const cells=[];
  for(let i=0;i<fd;i++)cells.push(null);
  for(let d=1;d<=dim;d++){const date=new Date(yr,mo,d).toDateString();cells.push({d,date,checked:habit.days?.find(x=>x.date===date)?.state==='done',isT:date===tday});}
  function prev(){if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1);}
  function next(){if(!canNext)return;if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);}
  return <Sheet onClose={onClose}>
    <div style={{fontSize:11,fontWeight:700,letterSpacing:1.8,color:T.muted,textTransform:'uppercase',marginBottom:8}}>{habit.text}</div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
      <button onClick={prev} style={{width:34,height:34,borderRadius:10,border:'0.5px solid '+T.sep,background:'rgba(120,120,128,.08)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><IcChevL c={T.text} s={18}/></button>
      <div style={{fontSize:17,fontWeight:700,color:T.text}}>{MOF[mo]} {yr}</div>
      <button onClick={next} style={{width:34,height:34,borderRadius:10,border:'0.5px solid '+T.sep,background:'rgba(120,120,128,.08)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',opacity:canNext?1:.3}}><IcChevR c={T.text} s={18}/></button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3,marginBottom:5}}>
      {WD.map(d=><div key={d} style={{textAlign:'center',fontSize:11,color:T.muted,fontWeight:600,padding:'2px 0'}}>{d}</div>)}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
      {cells.map((c,i)=>c===null?<div key={i}/>:
        <div key={i} onClick={()=>onToggle(habit.id,c.date)} style={{aspectRatio:'1',borderRadius:9,background:c.state==='done'?p.dot:c.state==='failed'?'rgba(255,69,58,.8)':c.isT?(p.dot+'22'):T.ctrl,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'all .15s',outline:c.isT?'2px solid '+(c.state==='failed'?'#ff453a':p.dot):'none',outlineOffset:2}}>
          <span style={{fontSize:15,fontWeight:c.isT?700:400,color:(c.state)?'#fff':T.text}}>{c.d}</span>
        </div>
      )}
    </div>
  </Sheet>;
}

  const activeTasks=openFolderId
    ?tasks.filter(t=>t.listId===openFolderId&&isScheduledForDate(t))
    :tasks.filter(t=>!t.listId&&isScheduledForDate(t));
  const undone=activeTasks.filter(t=>!t.done);

  }
  function swR(card){setTasks(ts=>ts.map(t=>t.id===card.id?{...t,done:true,reps:t.reps+1,lastDone:new Date().toISOString()}:t));}
  function swL(card){setTasks(ts=>{const o=ts.filter(t=>t.id!==card.id);return[...o.filter(t=>!t.done),card,...o.filter(t=>t.done)];});}

    if(sp||undone.length<2)return;
    setSp('fan');
    setTimeout(()=>{
      setTasks(ts=>{
        const a=[...ts];const ids=undone.map(t=>t.id);
        const idxs=ids.map(id=>a.findIndex(t=>t.id===id)).filter(i=>i>=0);

        const vals=idxs.map(i=>a[i]);
        for(let i=vals.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[vals[i],vals[j]]=[vals[j],vals[i]];}

/* ===== SORTABLE LIST вЂ” proper iOS-style drag reorder ===== */
function SortableList({items,keyFn,renderItem,onReorder,gap=16}){
  const[src,setSrc]=useState(null);
  const[tgt,setTgt]=useState(null);
  const srcRef=useRef(null);
  const tgtRef=useRef(null);
  const refs=useRef([]);
  const meas=useRef({tops:[],heights:[]});
  const startYRef=useRef(0);
  const dyRef=useRef(0);
  const timer=useRef(null);
  const activeRef=useRef(false);
  const pointerIdRef=useRef(null);

  function getY(e){return e.clientY??e.touches?.[0]?.clientY??0;}

  function measure(){
    const tops=[],heights=[];
    refs.current.forEach(el=>{
      if(el){const r=el.getBoundingClientRect();tops.push(r.top);heights.push(r.height);}
      else{tops.push(0);heights.push(0);}
    });
    meas.current={tops,heights};
  }

  function applyDragTransform(d){
    // Move dragged element directly via DOM вЂ” no React re-render
    const el=refs.current[srcRef.current];
    if(el)el.style.transform='translateY('+d+'px) scale(1.04)';
  }

  function applyShifts(newTgt){
    const{heights}=meas.current;
    const s=srcRef.current;
    if(s===null)return;
    const h=(heights[s]||80)+gap;
    refs.current.forEach((el,i)=>{
      if(!el||i===s)return;
      let shift=0;
      if(s<newTgt&&i>s&&i<=newTgt)shift=-h;
      else if(s>newTgt&&i>=newTgt&&i<s)shift=h;
      el.style.transform=shift?'translateY('+shift+'px)':'none';
    });
  }

  function onPs(idx,e){
    if(e.button!=null&&e.button!==0)return;
    const y=getY(e);
    startYRef.current=y;
    pointerIdRef.current=e.pointerId??null;
    timer.current=setTimeout(()=>{
      measure();
      activeRef.current=true;
      srcRef.current=idx;tgtRef.current=idx;
      startYRef.current=y;dyRef.current=0;
      // Reset all transforms first
      refs.current.forEach((el,i)=>{if(el)el.style.transition=i===idx?'box-shadow .15s':'transform .22s cubic-bezier(.2,.8,.4,1)';});
      const dragEl=refs.current[idx];
      if(dragEl){dragEl.style.transform='translateY(0) scale(1.04)';dragEl.style.boxShadow='0 28px 64px rgba(0,0,0,.32)';dragEl.style.zIndex='100';}
      setSrc(idx);setTgt(idx);
      if(navigator.vibrate)navigator.vibrate(40);
    },280);
  }

  function onPm(e){
    if(pointerIdRef.current!==null&&e.pointerId!=null&&e.pointerId!==pointerIdRef.current)return;
    if(!activeRef.current){
      if(Math.abs(getY(e)-startYRef.current)>8)clearTimeout(timer.current);
      return;
    }
    if(!activeRef.current||srcRef.current===null)return;
    e.preventDefault();e.stopPropagation();
    const y=getY(e);
    const d=y-startYRef.current;
    dyRef.current=d;
    applyDragTransform(d);
    const{tops,heights}=meas.current;
    const s=srcRef.current;
    const srcCenter=tops[s]+heights[s]/2+d;
    let newTgt=s;
    for(let i=0;i<items.length;i++){
      if(i===s)continue;
      const mid=tops[i]+heights[i]/2;
      if(i<s&&srcCenter<mid){newTgt=i;break;}
      if(i>s&&srcCenter>mid)newTgt=i;
    }
    if(newTgt!==tgtRef.current){tgtRef.current=newTgt;setTgt(newTgt);applyShifts(newTgt);}
  }

  function onPe(e){
    clearTimeout(timer.current);
    const s=srcRef.current,t=tgtRef.current;
    if(activeRef.current&&s!==null&&t!==null&&t!==s)onReorder(s,t);
    activeRef.current=false;
    pointerIdRef.current=null;
    // Reset all DOM transforms
    refs.current.forEach(el=>{if(el){el.style.transform='';el.style.boxShadow='';el.style.zIndex='';}});
    srcRef.current=null;tgtRef.current=null;
    setSrc(null);setTgt(null);
  }

  return <div style={{position:'relative'}}>
    {items.map((item,idx)=>{
      const isDrag=idx===src;
      const handleProps={
        onPointerDown:e=>onPs(idx,e),
        style:{cursor:'grab',touchAction:'none',WebkitUserSelect:'none',userSelect:'none'},
      };
      return <div
        key={keyFn(item,idx)}
        ref={el=>refs.current[idx]=el}
        onPointerMove={onPm}
        onPointerUp={onPe}
        onPointerCancel={onPe}
        onContextMenu={e=>e.preventDefault()}
        style={{marginBottom:gap,touchAction:'pan-y',position:'relative',borderRadius:28,willChange:'transform'}}
      >{renderItem(item,idx,isDrag,handleProps)}</div>;
    })}
  </div>;
}

function SwipeableCard({children,onSwipeRight,onSwipeLeft,onSwipeUp,style={}}){
  const stX=useRef(null),stY=useRef(null);
  const txR=useRef(0),tyR=useRef(0);
  const moving=useRef(false),dirL=useRef(null);
  const[tx,setTx]=useState(0);
  const[ty,setTy]=useState(0);

  function onTS(e){
    if(e.touches.length>1)return;
    stX.current=e.touches[0].clientX;
    stY.current=e.touches[0].clientY;
    txR.current=0;tyR.current=0;moving.current=false;dirL.current=null;
    setTx(0);setTy(0);
  }
  function onTM(e){
    if(stX.current===null)return;
    const dx=e.touches[0].clientX-stX.current;
    const dy=e.touches[0].clientY-stY.current;
    if(!moving.current){
      if(Math.abs(dx)>5||Math.abs(dy)>5){
        moving.current=true;
        dirL.current=Math.abs(dy)>Math.abs(dx)?'v':'h';
      } else return;
    }
    if(dirL.current==='v'){
      tyR.current=dy;txR.current=0;
      setTy(dy);setTx(0);
    } else {
      txR.current=dx;tyR.current=0;
      setTx(dx);setTy(0);
      e.stopPropagation(); // prevent scroll
    }
  }
  function onTE(){
    const cx=txR.current,cy=tyR.current;
    stX.current=null;stY.current=null;
    txR.current=0;tyR.current=0;
    moving.current=false;dirL.current=null;
    setTx(0);setTy(0);
    if(cy<-70&&Math.abs(cx)<60&&onSwipeUp){onSwipeUp();return;}
    if(cx>80&&onSwipeRight){onSwipeRight();return;}
    if(cx<-80&&onSwipeLeft){onSwipeLeft();return;}
  }

  const showH=Math.abs(tx)>30;
  const showUp=ty<-30&&Math.abs(tx)<50;

  return <div
    onTouchStart={onTS}
    onTouchMove={onTM}
    onTouchEnd={onTE}
    style={{position:'relative',overflow:'hidden',borderRadius:28,...style}}>
    {showUp&&<div style={{position:'absolute',inset:0,background:'rgba(120,120,128,.14)',display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:14,borderRadius:28,pointerEvents:'none',opacity:Math.min((-ty-30)/60,1)}}>
      <div style={{background:'rgba(60,60,70,.92)',borderRadius:50,padding:'7px 16px',display:'flex',alignItems:'center',gap:6}}>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        <span style={{color:'#fff',fontSize:12,fontWeight:700}}>Пропустить</span>
      </div>
    </div>}
    {showH&&tx>0&&<div style={{position:'absolute',inset:0,background:'rgba(48,209,88,.14)',display:'flex',alignItems:'center',paddingLeft:20,borderRadius:28,pointerEvents:'none',opacity:Math.min((tx-30)/60,1)}}>
      <div style={{background:'#30d158',borderRadius:50,padding:'7px 14px',display:'flex',alignItems:'center',gap:5}}><IcCheck c="#fff" s={13} sw={2.5}/><span style={{color:'#fff',fontSize:12,fontWeight:700}}>Сделано</span></div>
    </div>}
    {showH&&tx<0&&<div style={{position:'absolute',inset:0,background:'rgba(120,120,128,.12)',display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:20,borderRadius:28,pointerEvents:'none',opacity:Math.min((-tx-30)/60,1)}}>
      <div style={{background:'rgba(90,90,100,.9)',borderRadius:50,padding:'7px 14px',display:'flex',alignItems:'center',gap:5}}><IcX c="#fff" s={13} sw={2.5}/><span style={{color:'#fff',fontSize:12,fontWeight:700}}>Не выполнено</span></div>
    </div>}
    <div style={{transform:'translateX('+tx+'px) translateY('+(ty<0?ty*0.5:0)+'px)',transition:(tx===0&&ty===0)?'transform .28s cubic-bezier(.25,.46,.45,.94)':'none',willChange:'transform'}}>
      {children}
    </div>
  </div>;
}

function HabitCardsList({habits,setHabits,tday,d30,toggleDay,setDayState,setDayValue,streak,setEditH,sharedHabits=[],myUid,dark,onEditShared}){
  const{T}=useT();
  const P=dark?PD:PL;
  const pof=n=>P[Math.min(Math.max(n||0,0),P.length-1)];

  const allItems=[
    ...habits.map(h=>({_t:'r',_id:h.id,d:h})),
    ...sharedHabits.map(sh=>({_t:'s',_id:sh.id,d:sh}))
  ];

  function reorder(from,to){
    if(from>=habits.length||to>=habits.length)return;
    setHabits(hs=>{
      const visibleIds=habits.map(h=>h.id);
      const visible=hs.filter(h=>visibleIds.includes(h.id));
      const rest=hs.filter(h=>!visibleIds.includes(h.id));
      const item=visible.splice(from,1)[0];
      visible.splice(to,0,item);
      return [...visible,...rest];
    });
  }

  if(allItems.length===0)return <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:T.muted,fontSize:16}}>Нет привычек</div>;

  return <div className='no-select' style={{flex:1,overflowY:'auto',paddingTop:8,paddingBottom:8}}>
    <SortableList items={allItems} keyFn={item=>item._id} onReorder={reorder} renderItem={(item,idx,isDrag,handleProps)=>{
      if(item._t==='s'){
        return <SharedHabitCard sh={item.d} myUid={myUid} dark={dark} handleProps={handleProps} onEdit={()=>onEditShared&&onEditShared(item.d)}/>;
      }
      const h=item.d;
      const p=pof(h.colorIdx);const str=streak(h);const td=h.days?.find(d=>d.date===tday)?.state||null;
      return <div style={{background:p.bg,borderRadius:28,boxShadow:isDrag?'0 20px 50px rgba(0,0,0,.25)':'0 4px 20px rgba(0,0,0,.07)'}}>
        <div style={{padding:'18px 20px'}}>
          <div style={{display:'flex',alignItems:'flex-start',gap:8,marginBottom:12}}>
            <div {...(handleProps||{})} style={{...((handleProps||{}).style),width:18,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:6,opacity:.25}}>
              <svg width="10" height="16" viewBox="0 0 10 16" fill={p.text}>
                <circle cx="3" cy="2" r="1.5"/><circle cx="3" cy="8" r="1.5"/><circle cx="3" cy="14" r="1.5"/>
                <circle cx="8" cy="2" r="1.5"/><circle cx="8" cy="8" r="1.5"/><circle cx="8" cy="14" r="1.5"/>
              </svg>
            </div>
            <div style={{flex:1,minWidth:0}}>
              {str>0&&<div style={{fontSize:12,color:p.sub,fontWeight:600,marginBottom:3,display:'flex',alignItems:'center',gap:4}}><IcFlame c={p.sub} s={12}/>{str} дней подряд</div>}
              <div style={{fontSize:19,fontWeight:700,color:p.text,lineHeight:1.3,letterSpacing:-.3}}>{h.text}</div>
              {h.notes&&<div style={{fontSize:13,color:p.sub,marginTop:3,lineHeight:1.5}}>{h.notes}</div>}
              {hasSchedule(h)&&<div style={{fontSize:12,color:p.sub,marginTop:5,fontWeight:600}}>{h.weekdays.map(d=>WD[d]).join(' · ')}</div>}
            </div>
            <button onPointerDown={e=>e.stopPropagation()} onTouchEnd={e=>{e.preventDefault();e.stopPropagation();setEditH(h);}} onClick={e=>{e.stopPropagation();setEditH(h);}} style={{width:32,height:32,borderRadius:10,background:'rgba(0,0,0,.08)',border:'none',cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',WebkitTapHighlightColor:'transparent',touchAction:'manipulation'}}>
              <IcPencil c={p.sub} s={14}/>
            </button>
            <div onPointerDown={e=>e.stopPropagation()} onTouchEnd={e=>{e.preventDefault();e.stopPropagation();toggleDay(h.id,tday);}} onClick={e=>{e.stopPropagation();toggleDay(h.id,tday);}} style={{width:42,height:42,borderRadius:13,flexShrink:0,cursor:'pointer',border:'2px solid '+(td==='done'?'transparent':td==='failed'?'#ff453a':p.dot),background:td==='done'?p.dot:td==='failed'?'rgba(255,69,58,.85)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s',WebkitTapHighlightColor:'transparent',touchAction:'manipulation',boxShadow:td==='done'?'0 4px 14px '+p.dot+'50':'none'}}>
              {td==='done'&&<IcCheck c="#fff" s={18} sw={2.5}/>}
              {td==='failed'&&<IcX c="#fff" s={14} sw={2.5}/>}
            </div>
          </div>
          <DayStrip habit={h} dates30={d30} onToggle={toggleDay}/>
        </div>
      </div>;
    }}/>
  </div>;
}

function HabitsTab({habits,setHabits,dark,onToggleDark,sharedHabits=[],myUid}){
  const{T,ui}=useT();
  const P=dark?PD:PL;
  const pof=n=>P[Math.min(Math.max(n||0,0),P.length-1)];
  const d90=mkDates(90);
  const d30=mkDates(30);
  const tday=tod();
  const[adding,setAdding]=useState(false);
  const[addText,setAddText]=useState('');
  const[weekdays,setWeekdays]=useState([]);
  const[mode,setMode]=useState('stack');
  const[calH,setCalH]=useState(null);
  const[editH,setEditH]=useState(null);
  const[editSH,setEditSH]=useState(null);

  const visibleHabits=habits.filter(h=>isScheduledForDate(h,tday));
  function add(){if(!addText.trim())return;setHabits(hs=>[ensDays({id:Date.now(),text:addText.trim(),notes:'',colorIdx:hs.length%6,weekdays,days:[],totalReps:0},d90),...hs]);setAddText('');setWeekdays([]);setAdding(false);}
  function setDayState(hid,date,state){
    setHabits(hs=>hs.map(h=>{
      if(h.id!==hid)return h;
      const cur=h.days.find(d=>d.date===date)?.state||null;
      const newState=state==='toggle'?(cur==='done'?null:'done'):state;
      const delta=(newState==='done'?1:0)-(cur==='done'?1:0);
      const newDays=h.days.find(d=>d.date===date)
        ?h.days.map(d=>d.date===date?{...d,state:newState}:d)
        :[...h.days,{date,state:newState}];
      return{...h,totalReps:(h.totalReps||0)+delta,days:newDays};
    }));
  }
  function toggleDay(hid,date){setDayState(hid,date,'toggle');}
  function setDayValue(hid,date,value){
    setHabits(hs=>hs.map(h=>{
      if(h.id!==hid)return h;
      const autoComplete=h.widget?.autoComplete!==false;
      const hasValue=Number(value)>0;
      const prev=h.days.find(d=>d.date===date);
      const prevState=prev?.state||null;
      const nextState=autoComplete?(hasValue?'done':(prevState==='done'?null:prevState)):prevState;
      const delta=(nextState==='done'?1:0)-(prevState==='done'?1:0);
      const newDays=h.days.find(d=>d.date===date)
        ?h.days.map(d=>d.date===date?{...d,state:nextState,value}:d)
        :[...h.days,{date,state:nextState,value}];
      return{...h,totalReps:(h.totalReps||0)+delta,days:newDays};
    }));
  }
  function del(id){setHabits(hs=>hs.filter(h=>h.id!==id));setEditH(null);}
  function move(idx,dir){setHabits(hs=>{const a=[...hs];const t=idx+dir;if(t<0||t>=a.length)return a;[a[idx],a[t]]=[a[t],a[idx]];return a;});}
  function saveH(id,text,notes,ci,widget,weekdays){setHabits(hs=>hs.map(h=>h.id===id?{...h,text,notes,colorIdx:ci,widget:widget||null,weekdays}:h));setEditH(null);}
  function streak(h){let s=0;for(let i=d30.length-2;i>=0;i--){const dd=h.days?.find(x=>x.date===d30[i]);if(dd?.state==='done')s++;else break;}return s;}

  const undT=visibleHabits.filter(h=>{
    const st=h.days?.find(d=>d.date===tday)?.state||null;
    return st!=='done'&&st!=='failed';
  });
  const donT=visibleHabits.filter(h=> h.days?.find(d=>d.date===tday)?.state==='done');
  // Shared habits for stack: those not yet done today
  const sharedUndT=(myUid?sharedHabits:[]).filter(sh=>{
    const key='d_'+tday.replace(/[\s,]/g,'_');
    return !(sh.tracking?.[myUid]?.[key]);
  }).map(sh=>({...sh.habit,id:sh.id,_sharedId:sh.id,_isShared:true}));
  const allUndT=[...undT,...sharedUndT];
  const allDonT=[...donT,...(myUid?sharedHabits:[]).filter(sh=>{
    const key='d_'+tday.replace(/[\s,]/g,'_');
    return !!(sh.tracking?.[myUid]?.[key]);
  })];

  function swR(h){
    if(h._isShared){toggleSharedHabitDay(h._sharedId,myUid,tday,true);}
    else setDayState(h.id,tday,'done');
  }
  function swL(h){
    if(h._isShared){return;} // shared: just skip (no "failed")
    // Mark as failed AND remove from undone stack in one atomic update
    setHabits(hs=>hs.map(hh=>{
      if(hh.id!==h.id)return hh;
      const cur=hh.days.find(d=>d.date===tday)?.state||null;
      const delta=(0)-(cur==='done'?1:0);
      const newDays=hh.days.find(d=>d.date===tday)
        ?hh.days.map(d=>d.date===tday?{...d,state:'failed'}:d)
        :[...hh.days,{date:tday,state:'failed'}];
      return{...hh,totalReps:(hh.totalReps||0)+delta,days:newDays};
    }));
    // Do NOT move to end вЂ” card will naturally disappear from undT since state='failed'
  }
  function swU(h){setHabits(hs=>{const rest=hs.filter(x=>x.id!==h.id);return[...rest,h];});} // stack up = skip

  return <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    {calH&&<CalModal habit={calH} onClose={()=>setCalH(null)} onToggle={toggleDay}/>}
    {editSH&&<Sheet onClose={()=>setEditSH(null)}>
      <SectionLabel>Совместная привычка</SectionLabel>
      <div style={{background:T.ctrl,borderRadius:14,padding:'12px 16px',marginBottom:16,fontSize:16,fontWeight:600,color:T.text}}>{editSH.habit?.text}</div>
      {editSH.habit?.weekdays?.length>0&&<div style={{fontSize:13,color:T.sub,marginBottom:16}}>{editSH.habit.weekdays.map(d=>WD[d]).join(' · ')}</div>}
      <GlassBtn danger onClick={async()=>{await leaveSharedHabit(editSH.id);setEditSH(null);}}>Покинуть привычку</GlassBtn>
    </Sheet>}
    {editH&&<EditHabitSheet habit={editH} showCal={!!editH._showCal} onSave={(t,n,c,w,days)=>saveH(editH.id,t,n,c,w,days)} onDelete={()=>del(editH.id)} onCalendar={()=>{setCalH(editH);setEditH(null);}} onClose={()=>setEditH(null)}/>}
    {/* Header */}
    <div style={{flexShrink:0,padding:ui.isPhone?'20px 0 14px':'18px 0 12px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div>
        <div style={{fontSize:ui.isPhone?30:26,fontWeight:700,letterSpacing:-.5,color:T.text}}>Привычки</div>
        <div style={{fontSize:ui.isPhone?14:13,color:T.muted,fontWeight:500,marginTop:2}}>{donT.length}/{visibleHabits.length} сегодня</div>
      </div>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        <Pill onClick={()=>setMode(m=>m==='stack'?'cards':'stack')} active={mode==='cards'}>
          {mode==='stack'?<IcList c={T.ctrlTxt} s={14}/>:<IcStack c={T.pillTxt} s={14}/>}
          {mode==='stack'?'Список':'Стопка'}
        </Pill>
        <button onClick={onToggleDark} style={{width:ui.isPhone?40:34,height:ui.isPhone?40:34,borderRadius:ui.isPhone?12:10,border:'0.5px solid '+T.sep,background:T.ctrl,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:BL,WebkitBackdropFilter:BL,flexShrink:0}}>
          {dark?<IcSun c={T.ctrlTxt} s={ui.isPhone?18:16} sw={1.8}/>:<IcMoon c={T.ctrlTxt} s={ui.isPhone?18:16} sw={1.8}/>}
        </button>
        <PlusBtn onClick={()=>setAdding(v=>!v)} active={adding}/>
      </div>
    </div>
    {adding&&<div style={{flexShrink:0,background:T.glass,backdropFilter:BL,WebkitBackdropFilter:BL,borderRadius:20,padding:18,marginBottom:14,border:'0.5px solid '+T.sep,animation:'scaleIn .2s ease'}}>
      <input autoFocus value={addText} onChange={e=>setAddText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()} placeholder="Название привычки..." style={{width:'100%',border:'none',outline:'none',fontSize:17,background:'transparent',marginBottom:14,color:T.text}}/>
      <div style={{marginBottom:14}}><WeekdayPicker value={weekdays} onChange={setWeekdays}/></div>
      <button onClick={add} style={{width:'100%',padding:12,borderRadius:13,border:'none',background:T.pill,color:T.pillTxt,fontSize:15,fontWeight:600,cursor:'pointer'}}>Добавить</button>
    </div>}
    {/* Stack */}
    {mode==='stack'&&<div style={{flex:1,position:'relative',overflow:'hidden'}}>
      {visibleHabits.length===0
        ?<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',color:T.muted}}><IcLeaf c={T.muted} s={48}/><div style={{fontSize:16,fontWeight:500,marginTop:12}}>Нет привычек</div></div>
        :allUndT.length===0
        ?<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:10}}><IcCheck c={T.muted} s={48}/><div style={{fontSize:18,fontWeight:700,color:T.text}}>Всё отмечено!</div><div style={{fontSize:13,color:T.muted}}>{allDonT.length} ✓  {visibleHabits.filter(h=>h.days?.find(d=>d.date===tday)?.state==='failed').length} ✗</div></div>
        :<>
          <div style={{position:'absolute',top:0,left:0,right:0,zIndex:10,display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0 8px',pointerEvents:'none'}}>
            <span style={{fontSize:12,fontWeight:600,color:T.muted}}>← Позже</span>
            <span style={{fontSize:12,fontWeight:600,color:T.muted}}>Готово →</span>
          </div>
          <div style={{position:'absolute',top:22,left:0,right:0,bottom:0}}>
            <TinderStack items={allUndT} onRight={swR} onLeft={swL} onUp={swU} onTap={h=>h._isShared?setEditSH(sharedHabits.find(s=>s.id===h.id)):setEditH({...h,_showCal:true})} renderCard={(h)=>{
              const p=pof(h.colorIdx);const str=streak(h);
              return <div style={{padding:'24px 24px',height:'100%',display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
                <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>
                  {str>0&&<div style={{fontSize:12,color:p.sub,fontWeight:600,marginBottom:6,display:'flex',alignItems:'center',gap:5}}><IcFlame c={p.sub} s={12}/>{str} дней подряд</div>}
                  {hasSchedule(h)&&<div style={{fontSize:12,color:p.sub,fontWeight:600,marginBottom:6}}>{h.weekdays.map(d=>WD[d]).join(' · ')}</div>}
                  <div style={{fontSize:h.widget?22:28,fontWeight:700,color:p.text,lineHeight:1.3,letterSpacing:-.4,marginBottom:h.notes?8:h.widget?14:0}}>{h.text}</div>

/* ===== TAB 3: SR ===== */
function SRTab({dark,onToggleDark}){
  const{T,ui}=useT();
  const P=dark?PD:PL;
  const pof=n=>P[Math.min(Math.max(n||0,0),P.length-1)];
  const[cards,setCards]=useState(()=>ld('sr9',[]));
  const[front,setFront]=useState('');
  const[back,setBack]=useState('');
  const[flipped,setFlipped]=useState(false);
  const[fly,setFly]=useState(null);
  const[dx,setDx]=useState(0);
  const[dy,setDy]=useState(0);
  const stRef=useRef(null);
  const dxRef=useRef(0);
  const dyRef=useRef(0);
  const[adding,setAdding]=useState(false);
  useEffect(()=>{sv('sr9',cards);},[cards]);
  const now=Date.now();
  const due=cards.filter(c=>c.nextReview<=now).sort((a,b)=>a.nextReview-b.nextReview);
  const cur=due[0],sec=due[1],thr=due[2];
  const cp=cur?pof(cur.reps):P[0];

  function addCard(){if(!front.trim()||!back.trim())return;setCards(cs=>[...cs,{id:Date.now(),front:front.trim(),back:back.trim(),level:0,nextReview:Date.now(),reps:0}]);setFront('');setBack('');setAdding(false);}
  function answer(knew){
    if(!cur||fly)return;
    setFly(knew?'right':'left');setDx(0);setDy(0);dxRef.current=0;dyRef.current=0;
    setTimeout(()=>{
      setCards(cs=>cs.map(c=>{if(c.id!==cur.id)return c;const nl=knew?Math.min(c.level+1,SR.length-1):0;return{...c,level:nl,nextReview:Date.now()+SR[nl].ms,reps:(c.reps||0)+(knew?1:0)};}));
      setFly(null);setFlipped(false);setDx(0);setDy(0);
    },360);
  }
  function dn(e){if(fly)return;const x=e.clientX??e.touches?.[0]?.clientX;const y=e.clientY??e.touches?.[0]?.clientY;stRef.current={x,y};dxRef.current=0;dyRef.current=0;setDx(0);setDy(0);}
  function mv(e){if(!stRef.current||fly)return;const nx=(e.clientX??e.touches?.[0]?.clientX)-stRef.current.x;const ny=(e.clientY??e.touches?.[0]?.clientY)-stRef.current.y;dxRef.current=nx;dyRef.current=ny;setDx(nx);setDy(ny);}
  function up(){if(!stRef.current)return;const cx=dxRef.current,cy=dyRef.current;stRef.current=null;if(cx>90)answer(true);else if(cx<-90)answer(false);else if(Math.abs(cx)<12&&Math.abs(cy)<12)setFlipped(f=>!f);if(Math.abs(cx)<=90){dxRef.current=0;dyRef.current=0;setDx(0);setDy(0);}}
  const drag=!!stRef.current&&!fly;

  return <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    <div style={{flexShrink:0,padding:ui.isPhone?'20px 0 14px':'18px 0 12px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div>
        <div style={{fontSize:ui.isPhone?30:26,fontWeight:700,letterSpacing:-.5,color:T.text}}>Повторение</div>
        <div style={{fontSize:ui.isPhone?14:13,color:T.muted,fontWeight:500,marginTop:2}}>{due.length} к повторению · {cards.length} всего</div>
      </div>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        <button onClick={onToggleDark} style={{width:ui.isPhone?40:34,height:ui.isPhone?40:34,borderRadius:ui.isPhone?12:10,border:'0.5px solid '+T.sep,background:T.ctrl,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:BL,WebkitBackdropFilter:BL,flexShrink:0}}>
          {dark?<IcSun c={T.ctrlTxt} s={ui.isPhone?18:16} sw={1.8}/>:<IcMoon c={T.ctrlTxt} s={ui.isPhone?18:16} sw={1.8}/>}
        </button>
        <PlusBtn onClick={()=>setAdding(v=>!v)} active={adding}/>
      </div>
    </div>
    {adding&&<div style={{flexShrink:0,background:T.glass,backdropFilter:BL,WebkitBackdropFilter:BL,borderRadius:20,padding:18,marginBottom:14,border:'0.5px solid '+T.sep,animation:'scaleIn .2s ease'}}>
      <input autoFocus value={front} onChange={e=>setFront(e.target.value)} placeholder="Вопрос..." style={{width:'100%',border:'none',borderBottom:'0.5px solid '+T.sep,outline:'none',fontSize:16,background:'transparent',paddingBottom:11,marginBottom:12,color:T.text}}/>
      <input value={back} onChange={e=>setBack(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCard()} placeholder="Ответ..." style={{width:'100%',border:'none',outline:'none',fontSize:16,background:'transparent',marginBottom:14,color:T.text}}/>
      <button onClick={addCard} style={{width:'100%',padding:12,borderRadius:13,border:'none',background:T.pill,color:T.pillTxt,fontSize:15,fontWeight:600,cursor:'pointer'}}>Добавить</button>
    </div>}
    {cur?<div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{flexShrink:0,display:'flex',justifyContent:'space-between',padding:'0 8px',marginBottom:12}}>
        <span style={{fontSize:12,fontWeight:600,color:dx<-40?'#ff3b30':T.muted,transition:'color .1s'}}>← Не знаю</span>
        <span style={{fontSize:12,fontWeight:600,color:dx>40?'#30d158':T.muted,transition:'color .1s'}}>Знаю →</span>
      </div>
      <div style={{flex:1,position:'relative'}}>
        {thr&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}><div style={{width:'calc(100% - 44px)',height:'100%',borderRadius:28,background:pof(thr.reps).bg,transform:'scale(.88) translateY('+(drag?-12:0)+'px)',transition:drag?'none':'transform .3s ease'}}/></div>}
        {sec&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}><div style={{width:'calc(100% - 22px)',height:'100%',borderRadius:28,background:pof(sec.reps).bg,transform:'scale(.94) translateY('+(drag?-20:0)+'px)',transition:drag?'none':'transform .3s ease',boxShadow:'0 4px 24px rgba(0,0,0,.12)'}}/></div>}
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div onMouseDown={dn} onMouseMove={mv} onMouseUp={up} onMouseLeave={up}
            onTouchStart={e=>dn(e.touches[0])} onTouchMove={e=>{e.preventDefault();mv(e.touches[0]);}} onTouchEnd={up}
            style={{width:'100%',height:'100%',borderRadius:28,background:cp.bg,
              boxShadow:dx>40?'0 18px 52px rgba(48,209,88,.24)':dx<-40?'0 18px 52px rgba(255,59,48,.2)':'0 16px 52px rgba(0,0,0,.15)',
              cursor:fly?'default':'grab',userSelect:'none',position:'relative',overflow:'hidden',
              transform:fly==='right'?'translateX(160vw) rotate(26deg)':fly==='left'?'translateX(-160vw) rotate(-26deg)':('translateX('+dx+'px) translateY('+(dy*.08)+'px) rotate('+(dx*.05)+'deg)'),
              transition:fly||!stRef.current?'transform .36s cubic-bezier(.25,.46,.45,.94),box-shadow .15s':'box-shadow .15s',
            }}>
            {dx>30&&<div style={{position:'absolute',inset:0,borderRadius:28,background:'rgba(48,209,88,.1)',display:'flex',alignItems:'flex-start',justifyContent:'flex-end',padding:20,pointerEvents:'none',opacity:Math.min((dx-30)/60,1)}}><div style={{background:'#30d158',borderRadius:50,padding:'7px 14px',display:'flex',alignItems:'center',gap:6}}><IcCheck c="#fff" s={14} sw={2.5}/><span style={{color:'#fff',fontSize:13,fontWeight:700}}>Знаю</span></div></div>}
            {dx<-30&&<div style={{position:'absolute',inset:0,borderRadius:28,background:'rgba(255,59,48,.08)',display:'flex',alignItems:'flex-start',justifyContent:'flex-start',padding:20,pointerEvents:'none',opacity:Math.min((-dx-30)/60,1)}}><div style={{background:'#ff3b30',borderRadius:50,padding:'7px 14px',display:'flex',alignItems:'center',gap:6}}><IcX c="#fff" s={14} sw={2.5}/><span style={{color:'#fff',fontSize:13,fontWeight:700}}>Не знаю</span></div></div>}
            <div style={{padding:'28px 24px',height:'100%',display:'flex',flexDirection:'column',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{width:'100%'}}>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:2.5,color:cp.sub,marginBottom:16,textTransform:'uppercase',textAlign:'center'}}>{flipped?'Ответ':'Вопрос'}</div>
                <div style={{fontSize:26,fontWeight:700,textAlign:'center',color:cp.text,lineHeight:1.4,letterSpacing:-.3}}>{flipped?cur.back:cur.front}</div>
              </div>
              <div style={{width:'100%'}}>
                <div style={{display:'flex',gap:5,justifyContent:'center',marginBottom:8}}>{SR.map((_,i)=><div key={i} style={{width:cur.level>=i?20:8,height:5,borderRadius:3,background:cur.level>=i?cp.dot:'rgba(128,128,128,.18)',transition:'all .3s'}}/>)}</div>
                <div style={{fontSize:12,color:cp.sub,textAlign:'center',fontWeight:500}}>{flipped?'свайп: вправо - знаю, влево - нет':'нажми чтобы перевернуть'}</div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div style={{flexShrink:0,display:'flex',gap:12,justifyContent:'center',padding:'14px 0 8px'}}>
        {[{cb:()=>answer(false),c:'#ff3b30',bg:dark?'rgba(255,59,48,.12)':'rgba(255,59,48,.07)',Icon:IcX},{cb:()=>setFlipped(f=>!f),c:T.sub,bg:T.ctrl,Icon:IcRepeat},{cb:()=>answer(true),c:'#30d158',bg:dark?'rgba(48,209,88,.12)':'rgba(48,209,88,.07)',Icon:IcCheck}].map((b,i)=>
          <button key={i} onClick={b.cb} style={{width:58,height:58,borderRadius:'50%',border:'1px solid '+(b.c+'28'),background:b.bg,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',backdropFilter:BL,WebkitBackdropFilter:BL}}>
            <b.Icon c={b.c} s={22} sw={2}/>
          </button>
        )}
      </div>
    </div>
    :cards.length>0?<div style={{flex:1,overflowY:'auto'}}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',paddingTop:28,paddingBottom:16,gap:8}}>
        <IcRepeat c={T.muted} s={44}/>
        <div style={{fontSize:18,fontWeight:700,letterSpacing:-.3,color:T.text}}>Всё повторено!</div>
        <div style={{color:T.muted,fontSize:14,fontWeight:500}}>Следующее: {fmtMs(Math.min(...cards.map(c=>c.nextReview))-now)}</div>
      </div>
      <div style={{background:T.glass,backdropFilter:BL,WebkitBackdropFilter:BL,borderRadius:18,overflow:'hidden',border:'0.5px solid '+T.sep}}>
        {cards.map((c,i)=>{const p2=pof(c.reps);return <div key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'11px 14px',borderBottom:i<cards.length-1?'0.5px solid '+T.sep:'none'}}>
          <div style={{width:8,height:8,borderRadius:'50%',background:p2.dot,flexShrink:0}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,color:T.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.front}</div>
            <div style={{fontSize:12,color:T.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.back}</div>
          </div>
          <div style={{fontSize:11,fontWeight:600,color:T.muted,textAlign:'right',flexShrink:0}}>
            <div>{fmtMs(c.nextReview-now)}</div>
            <div>Ур.{c.level+1}</div>
          </div>
          <button onClick={()=>setCards(cs=>cs.filter(x=>x.id!==c.id))} style={{background:'none',border:'none',cursor:'pointer',display:'flex',opacity:.4}}><IcX c={T.muted} s={15}/></button>
        </div>;})}
      </div>
    </div>
    :<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:T.muted,gap:12}}>
      <IcBrain c={T.muted} s={44}/>
      <div style={{fontSize:16,fontWeight:500}}>Нажми + чтобы добавить</div>
    </div>}
  </div>;
}

/* ===== SWIPE CARD (для отклонения карточек в чате) ===== */
function SwipeCard({children,onDecline}){
  const startX=useRef(0);
  const [dx,setDx]=useState(0);
  const [out,setOut]=useState(false);
  function ts(e){startX.current=e.touches[0].clientX;}
  function tm(e){const d=e.touches[0].clientX-startX.current;if(d<0)setDx(d);}
  function te(){
    if(dx<-80){setOut(true);setTimeout(()=>onDecline&&onDecline(),280);}
    setDx(0);
  }
  return <div onTouchStart={ts} onTouchMove={tm} onTouchEnd={te}
    className={out?'card-off':''}
    style={{transform:out?undefined:`translateX(${dx}px)`,transition:dx===0&&!out?'transform .3s':undefined}}>
    {children}
  </div>;
}

/* ===== CHAT MESSAGE ===== */
function ChatMessage({msg,isOwn,chatId,myUid,onAddTask}){
  const{T,ui}=useT();
  const[declined,setDeclined]=useState(msg.status==='declined');
  const[accepted,setAccepted]=useState(msg.status==='accepted');
  const isText=msg.type==='text';
  const isTask=msg.type==='task';
  const isStack=msg.type==='stack';
  const isHabit=msg.type==='habit';

  async function accept(){
    await setChatMsgStatus(chatId,msg.id,'accepted');
    setAccepted(true);
    if(isTask&&onAddTask)onAddTask({...msg.task,id:Date.now(),done:false});
    if(isStack&&onAddTask)(msg.tasks||[]).forEach((t,i)=>onAddTask({...t,id:Date.now()+i,done:false}));
    if(isHabit&&msg.sharedHabitId)await activateSharedHabit(msg.sharedHabitId);
  }
  async function decline(){
    await setChatMsgStatus(chatId,msg.id,'declined');
    setDeclined(true);
  }

  if(isText){
    return <div style={{display:'flex',justifyContent:isOwn?'flex-end':'flex-start'}}>
      <div style={{maxWidth:'78%',padding:'9px 14px',borderRadius:isOwn?'18px 18px 4px 18px':'18px 18px 18px 4px',background:isOwn?T.pill:'rgba(120,120,128,.15)',color:isOwn?T.pillTxt:T.text,fontSize:15,lineHeight:1.4,wordBreak:'break-word'}}>
        {msg.text}
      </div>
    </div>;
  }

  if(declined){
    return <div style={{display:'flex',justifyContent:isOwn?'flex-end':'flex-start'}}>
      <div style={{fontSize:13,color:T.muted,fontStyle:'italic',padding:'4px 0'}}>{isOwn?'Получатель отклонил':'Вы отклонили'}</div>
    </div>;
  }
  if(accepted&&isOwn){
    return <div style={{display:'flex',justifyContent:'flex-end'}}>
      <div style={{fontSize:13,color:'#30d158',fontWeight:500,padding:'4px 0'}}>✓ Принято</div>
    </div>;
  }

  const canAct=!isOwn&&!accepted&&!declined;
  const typeMap={
    task:{accent:'#007aff',bg:'rgba(0,122,255,.09)',label:'Задача',icon:'📋'},
    stack:{accent:'#5856d6',bg:'rgba(88,86,214,.09)',label:'Стопка',icon:'📚'},
    habit:{accent:'#30d158',bg:'rgba(48,209,88,.09)',label:'Совместная привычка',icon:'🔄'},
  };
  const tm=typeMap[msg.type]||typeMap.task;
  const cardTitle=isTask?(msg.task?.text||'Задача'):isStack?`${(msg.tasks||[]).length} карточек`:(msg.habit?.text||'Привычка');

  const inner=<div className={!isOwn&&msg.status==='pending'?'card-in':''} style={{
    background:T.card,borderRadius:18,overflow:'hidden',maxWidth:272,
    boxShadow:'0 6px 28px rgba(0,0,0,.14)',border:'0.5px solid '+T.sep
  }}>
    {/* Colored header */}
    <div style={{background:tm.bg,padding:'12px 14px',borderBottom:'0.5px solid '+tm.accent+'33',display:'flex',alignItems:'center',gap:10}}>
      <span style={{fontSize:22,flexShrink:0}}>{tm.icon}</span>
      <div style={{minWidth:0}}>
        <div style={{fontSize:10,fontWeight:800,color:tm.accent,letterSpacing:.8,textTransform:'uppercase',marginBottom:2}}>{tm.label}</div>
        <div style={{fontSize:15,fontWeight:700,color:T.text,lineHeight:1.25,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{cardTitle}</div>
      </div>
    </div>
    {/* Body */}
    <div style={{padding:'10px 14px'}}>
      {isStack&&msg.tasks?.length>0&&<div style={{fontSize:12,color:T.sub,marginBottom:8,lineHeight:1.5}}>{msg.tasks.slice(0,3).map(t=>t.text).join(' · ')}{msg.tasks.length>3?` +${msg.tasks.length-3}`:''}</div>}
      {isHabit&&msg.habit?.weekdays?.length>0&&<div style={{fontSize:12,color:T.sub,marginBottom:8}}>{msg.habit.weekdays.map(d=>WD[d]).join(' · ')}</div>}
      {canAct&&<div style={{display:'flex',gap:7}}>
        <button onClick={e=>{e.stopPropagation();decline();}} style={{flex:1,padding:'8px 0',borderRadius:11,border:'none',background:'rgba(255,59,48,.1)',color:'#ff3b30',fontSize:14,fontWeight:600,cursor:'pointer'}}>Отклонить</button>
        <button onClick={e=>{e.stopPropagation();accept();}} style={{flex:1,padding:'8px 0',borderRadius:11,border:'none',background:tm.accent,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>Принять</button>
      </div>}
      {accepted&&!isOwn&&<div style={{fontSize:13,color:'#30d158',fontWeight:600}}>✓ Принято</div>}
    </div>
  </div>;

  if(canAct){
    return <div style={{display:'flex',justifyContent:'flex-start',alignItems:'center',gap:8}}>
      <div style={{fontSize:13,color:T.muted,opacity:.4,flexShrink:0,userSelect:'none'}}>←</div>
      <SwipeCard onDecline={decline}>{inner}</SwipeCard>
    </div>;
  }
  return <div style={{display:'flex',justifyContent:isOwn?'flex-end':'flex-start'}}>{inner}</div>;
}

/* ===== CHAT VIEW ===== */
function ChatView({authUser,chatId,otherProfile,onBack,tasks,habits,onAddTask}){
  const{T,ui}=useT();
  const[messages,setMessages]=useState([]);
  const[text,setText]=useState('');
  const[sending,setSending]=useState(false);
  const[showMenu,setShowMenu]=useState(false);
  const[shareMode,setShareMode]=useState(null);
  const[selTasks,setSelTasks]=useState([]);
  const bottomRef=useRef(null);
  const ia=IaStyle(T,ui);

  useEffect(()=>{
    if(!_db)return;
    const unsub=_db.collection('chats').doc(chatId).collection('messages')
      .orderBy('ts','asc')
      .onSnapshot(snap=>{
        setMessages(snap.docs.map(d=>({id:d.id,...d.data()})));
        requestAnimationFrame(()=>bottomRef.current?.scrollIntoView({behavior:'smooth'}));
      },e=>console.warn('msgs:',e));
    return unsub;
  },[chatId]);

  async function send(){
    if(!text.trim()||sending)return;
    setSending(true);
    try{await sendChatMsg(chatId,authUser.uid,'text',{text:text.trim()});setText('');}catch(e){}
    setSending(false);
  }
  async function sendTask(task){
    await sendChatMsg(chatId,authUser.uid,'task',{task:{text:task.text,notes:task.notes||'',colorIdx:task.colorIdx||0}});
    setShareMode(null);
  }
  async function sendStack(){
    if(!selTasks.length)return;
    const sel=tasks.filter(t=>selTasks.includes(t.id));
    await sendChatMsg(chatId,authUser.uid,'stack',{tasks:sel.map(t=>({text:t.text,notes:t.notes||'',colorIdx:t.colorIdx||0}))});
    setShareMode(null);setSelTasks([]);
  }
  async function sendHabit(habit){
    const otherUid=otherProfile?.uid;if(!otherUid)return;
    const shId=await createSharedHabitDoc(authUser.uid,otherUid,habit);
    await sendChatMsg(chatId,authUser.uid,'habit',{habit:{text:habit.text,colorIdx:habit.colorIdx||0,weekdays:habit.weekdays||[]},sharedHabitId:shId});
    setShareMode(null);
  }

  const btnBase={border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0};

  return <div style={{flex:1,display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
    {/* Header */}
    <div style={{display:'flex',alignItems:'center',gap:10,paddingBottom:12,borderBottom:'0.5px solid '+T.sep,flexShrink:0}}>
      <button onClick={onBack} style={{...btnBase,background:'none',padding:'4px 0',width:28}}>
        <IcChevL c={T.text} s={26} sw={2.2}/>
      </button>
      <div style={{width:38,height:38,borderRadius:19,background:'linear-gradient(135deg,#5856d6,#007aff)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,fontWeight:700,color:'#fff',flexShrink:0}}>
        {(otherProfile?.name||otherProfile?.email||'?')[0].toUpperCase()}
      </div>
      <div style={{fontWeight:700,fontSize:17,color:T.text,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
        {otherProfile?.name||otherProfile?.email||'...'}
      </div>
    </div>
    {/* Messages */}
    <div style={{flex:1,overflowY:'auto',paddingTop:12,display:'flex',flexDirection:'column',gap:10}}>
      {messages.length===0&&<div style={{textAlign:'center',color:T.muted,marginTop:50,fontSize:14}}>Начните переписку</div>}
      {messages.map(msg=><ChatMessage key={msg.id} msg={msg} isOwn={msg.from===authUser.uid}
        chatId={chatId} myUid={authUser.uid} onAddTask={onAddTask}/>)}
      <div ref={bottomRef} style={{height:4}}/>
    </div>
    {/* Share picker panels */}
    {shareMode==='task'&&<div style={{background:T.card,borderRadius:'16px 16px 0 0',border:'0.5px solid '+T.sep,maxHeight:220,display:'flex',flexDirection:'column',flexShrink:0}}>
      <div style={{padding:'12px 16px 8px',fontWeight:700,color:T.text,fontSize:15,flexShrink:0}}>Выберите карточку</div>
      <div style={{overflowY:'auto'}}>
        {tasks.filter(t=>!t.done).map(t=><div key={t.id} onClick={()=>sendTask(t)}
          style={{padding:'10px 16px',borderTop:'0.5px solid '+T.sep,cursor:'pointer',fontSize:15,color:T.text,WebkitTapHighlightColor:'transparent'}}>{t.text}</div>)}
        {tasks.filter(t=>!t.done).length===0&&<div style={{padding:'16px',color:T.muted,fontSize:14}}>Нет активных задач</div>}
      </div>
    </div>}
    {shareMode==='stack'&&<div style={{background:T.card,borderRadius:'16px 16px 0 0',border:'0.5px solid '+T.sep,maxHeight:240,display:'flex',flexDirection:'column',flexShrink:0}}>
      <div style={{padding:'12px 16px 8px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <span style={{fontWeight:700,color:T.text,fontSize:15}}>Выберите карточки</span>
        <button onClick={sendStack} disabled={!selTasks.length} style={{background:selTasks.length?T.pill:T.ctrl,color:selTasks.length?T.pillTxt:T.ctrlTxt,border:'none',borderRadius:10,padding:'6px 12px',fontWeight:600,fontSize:13,cursor:selTasks.length?'pointer':'default'}}>Отправить {selTasks.length>0?`(${selTasks.length})`:''}</button>
      </div>
      <div style={{overflowY:'auto'}}>
        {tasks.filter(t=>!t.done).map(t=>{
          const sel=selTasks.includes(t.id);
          return <div key={t.id} onClick={()=>setSelTasks(s=>sel?s.filter(x=>x!==t.id):[...s,t.id])}
            style={{padding:'10px 16px',borderTop:'0.5px solid '+T.sep,cursor:'pointer',fontSize:15,color:T.text,display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:22,height:22,borderRadius:7,border:'1.5px solid '+(sel?'transparent':T.sep),background:sel?T.pill:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              {sel&&<IcCheck c={T.pillTxt} s={14} sw={2.5}/>}
            </div>
            {t.text}
          </div>;
        })}
      </div>
    </div>}
    {shareMode==='habit'&&<div style={{background:T.card,borderRadius:'16px 16px 0 0',border:'0.5px solid '+T.sep,maxHeight:220,display:'flex',flexDirection:'column',flexShrink:0}}>
      <div style={{padding:'12px 16px 8px',fontWeight:700,color:T.text,fontSize:15,flexShrink:0}}>Выберите привычку</div>
      <div style={{overflowY:'auto'}}>
        {habits.map(h=><div key={h.id} onClick={()=>sendHabit(h)}
          style={{padding:'10px 16px',borderTop:'0.5px solid '+T.sep,cursor:'pointer',fontSize:15,color:T.text}}>🔄 {h.text}</div>)}
        {habits.length===0&&<div style={{padding:'16px',color:T.muted,fontSize:14}}>Нет привычек</div>}
      </div>
    </div>}
    {/* Input */}
    <div style={{paddingTop:8,flexShrink:0,display:'flex',gap:8,alignItems:'center'}}>
      <div style={{position:'relative'}}>
        <button onClick={()=>{setShowMenu(m=>!m);if(shareMode)setShareMode(null);}}
          style={{...btnBase,width:42,height:42,borderRadius:13,border:'0.5px solid '+T.sep,background:showMenu?T.pill:T.ctrl}}>
          <IcPlus c={showMenu?T.pillTxt:T.ctrlTxt} s={20} sw={2}/>
        </button>
        {showMenu&&<div style={{position:'absolute',bottom:50,left:0,background:T.card,borderRadius:14,border:'0.5px solid '+T.sep,padding:'4px 0',minWidth:170,boxShadow:'0 8px 32px rgba(0,0,0,.18)',zIndex:20}}>
          {[['task','📋 Карточку'],['stack','📚 Стопку карточек'],['habit','🔄 Привычку (совместную)']].map(([m,l])=>
            <div key={m} onClick={()=>{setShareMode(shareMode===m?null:m);setShowMenu(false);}}
              style={{padding:'11px 16px',fontSize:14,color:T.text,cursor:'pointer',WebkitTapHighlightColor:'transparent'}}>{l}</div>
          )}
        </div>}
      </div>
      <input value={text} onChange={e=>setText(e.target.value)}
        onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
        placeholder="Сообщение..." style={{...ia,flex:1,padding:'10px 14px',fontSize:15}}/>
      <button onClick={send} disabled={sending||!text.trim()}
        style={{...btnBase,width:42,height:42,borderRadius:13,border:'none',background:text.trim()?T.pill:T.ctrl}}>
        <IcSend c={text.trim()?T.pillTxt:T.ctrlTxt} s={16} sw={2}/>
      </button>
    </div>
  </div>;
}

/* ===== CHAT TAB ===== */
function ChatTab({authUser,tasks,habits,onAddTask}){
  const{T,ui}=useT();
  const[chats,setChats]=useState([]);
  const[profiles,setProfiles]=useState({});
  const[openChat,setOpenChat]=useState(null);
  const[showSearch,setShowSearch]=useState(false);
  const[searchEmail,setSearchEmail]=useState('');
  const[searchRes,setSearchRes]=useState(null);
  const[searchErr,setSearchErr]=useState('');
  const[searching,setSearching]=useState(false);
  const ia=IaStyle(T,ui);

  useEffect(()=>{
    if(!authUser||!_db)return;
    const unsub=_db.collection('chats')
      .where('participants','array-contains',authUser.uid)
      .onSnapshot(async snap=>{
        const data=snap.docs.map(d=>({id:d.id,...d.data()}));
        data.sort((a,b)=>(b.lastTs?.seconds||0)-(a.lastTs?.seconds||0));
        setChats(data);
        const uids=[...new Set(data.flatMap(c=>c.participants).filter(u=>u!==authUser.uid))];
        const profs={};
        await Promise.all(uids.map(async uid=>{
          try{const p=await _db.collection('profiles').doc(uid).get();if(p.exists)profs[uid]=p.data();}catch(e){}
        }));
        setProfiles(p=>({...p,...profs}));
      },e=>console.warn('chats:',e));
    return unsub;
  },[authUser?.uid]);

  if(!authUser){
    return <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,paddingBottom:80}}>
      <div style={{fontSize:56}}>💬</div>
      <div style={{fontSize:18,fontWeight:700,color:T.text}}>Войдите в аккаунт</div>
      <div style={{fontSize:14,color:T.sub,textAlign:'center',maxWidth:260,lineHeight:1.5}}>Делитесь задачами и привычками с друзьями</div>
    </div>;
  }
  if(openChat){
    return <ChatView authUser={authUser} chatId={openChat.id}
      otherProfile={profiles[openChat.otherUid]||{name:'...',email:''}}
      onBack={()=>setOpenChat(null)} tasks={tasks} habits={habits} onAddTask={onAddTask}/>;
  }

  async function doSearch(){
    setSearching(true);setSearchErr('');setSearchRes(null);
    try{
      const p=await searchProfileByEmail(searchEmail);
      if(!p)setSearchErr('Пользователь не найден');
      else if(p.uid===authUser.uid)setSearchErr('Это вы 🙂');
      else setSearchRes(p);
    }catch(e){setSearchErr('Ошибка поиска');}
    setSearching(false);
  }
  async function openWithUser(prof){
    try{
      const cid=await getOrCreateChat(authUser.uid,prof.uid);
      setProfiles(p=>({...p,[prof.uid]:prof}));
      setOpenChat({id:cid,otherUid:prof.uid});
      setShowSearch(false);setSearchEmail('');setSearchRes(null);setSearchErr('');
    }catch(e){
      setSearchErr('Ошибка: '+(e?.message||e?.code||String(e)));
    }
  }

  return <div style={{flex:1,display:'flex',flexDirection:'column',paddingTop:ui.isPhone?18:14,overflow:'hidden'}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,flexShrink:0}}>
      <div style={{fontSize:ui.isPhone?30:26,fontWeight:700,letterSpacing:-.5,color:T.text}}>Чаты</div>
      <GlassBtn onClick={()=>setShowSearch(true)}><IcUserPl c="currentColor" s={15} sw={2}/> Найти</GlassBtn>
    </div>
    <div style={{flex:1,overflowY:'auto'}}>
      {chats.length===0&&<div style={{textAlign:'center',color:T.sub,marginTop:70}}>
        <div style={{fontSize:48,marginBottom:14}}>💬</div>
        <div style={{fontSize:15,marginBottom:6}}>Нет активных чатов</div>
        <div style={{fontSize:13}}>Нажмите «Найти», чтобы написать другу</div>
      </div>}
      {chats.map(chat=>{
        const otherUid=chat.participants.find(u=>u!==authUser.uid);
        const prof=profiles[otherUid]||{name:'...',email:''};
        return <div key={chat.id} onClick={()=>setOpenChat({id:chat.id,otherUid})}
          style={{display:'flex',alignItems:'center',gap:14,padding:'12px 0',borderBottom:'0.5px solid '+T.sep,cursor:'pointer',WebkitTapHighlightColor:'transparent'}}>
          <div style={{width:50,height:50,borderRadius:25,background:'linear-gradient(135deg,#5856d6,#007aff)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:700,color:'#fff',flexShrink:0}}>
            {(prof.name||prof.email||'?')[0].toUpperCase()}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:600,fontSize:15,color:T.text,marginBottom:2}}>{prof.name||prof.email}</div>
            <div style={{fontSize:13,color:T.sub,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{chat.lastMsg||'Чат открыт'}</div>
          </div>
          <IcChevR c={T.muted} s={18} sw={1.8}/>
        </div>;
      })}
    </div>
    {showSearch&&<Sheet onClose={()=>{setShowSearch(false);setSearchEmail('');setSearchRes(null);setSearchErr('');}}>
      <SectionLabel>Найти пользователя</SectionLabel>
      <input type="email" value={searchEmail} onChange={e=>setSearchEmail(e.target.value)}
        onKeyDown={e=>e.key==='Enter'&&doSearch()}
        placeholder="Email друга" style={{...ia,marginBottom:10,fontSize:16}}/>
      <button onClick={doSearch} disabled={searching||!searchEmail.trim()}
        style={{width:'100%',padding:13,borderRadius:14,border:'none',background:T.pill,color:T.pillTxt,fontSize:16,fontWeight:600,cursor:'pointer',marginBottom:12,opacity:!searchEmail.trim()?0.5:1}}>
        {searching?'Поиск...':'Найти'}
      </button>
      {searchErr&&<div style={{color:'#ff453a',fontSize:13,marginBottom:10,padding:'8px 12px',background:'rgba(255,69,58,.08)',borderRadius:10}}>{searchErr}</div>}
      {searchRes&&<div onClick={()=>openWithUser(searchRes)}
        style={{display:'flex',alignItems:'center',gap:12,padding:14,borderRadius:14,background:T.ctrl,cursor:'pointer',WebkitTapHighlightColor:'transparent'}}>
        <div style={{width:44,height:44,borderRadius:22,background:'linear-gradient(135deg,#5856d6,#007aff)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,fontWeight:700,color:'#fff'}}>
          {(searchRes.name||searchRes.email)[0].toUpperCase()}
        </div>
        <div style={{flex:1}}>
          <div style={{fontWeight:600,color:T.text,fontSize:15}}>{searchRes.name}</div>
          <div style={{fontSize:13,color:T.sub}}>{searchRes.email}</div>
        </div>
        <div style={{color:T.pill,fontSize:14,fontWeight:700}}>Открыть →</div>
      </div>}
    </Sheet>}
  </div>;
}

/* ===== SHARED HABIT CARD ===== */
function SharedHabitCard({sh,myUid,dark,handleProps,onEdit}){
  const{T}=useT();
  const P=dark?PD:PL;
  const p=P[Math.min(Math.max(sh.habit?.colorIdx||0,0),P.length-1)];
  const d30=mkDates(30);
  const tracking=sh.tracking||{};
  const otherUid=(sh.participants||[]).find(u=>u!==myUid);
  const tday=tod();

  function getVal(uid,date){
    const key='d_'+date.replace(/[\s,]/g,'_');
    return !!(tracking[uid]&&tracking[uid][key]);
  }
  async function toggle(date){
    await toggleSharedHabitDay(sh.id,myUid,date,!getVal(myUid,date));
  }
  const tdDone=getVal(myUid,tday);

  function MiniStrip({uid,isMe,label}){
    const ref=useRef(null);
    useEffect(()=>{if(ref.current)ref.current.scrollLeft=ref.current.scrollWidth;},[]);
    return <div>
      <div style={{fontSize:9,fontWeight:700,color:p.sub,letterSpacing:.6,textTransform:'uppercase',marginBottom:3,opacity:.8}}>{label}</div>
      <div ref={ref} style={{display:'flex',gap:3,overflowX:'auto',scrollbarWidth:'none',msOverflowStyle:'none',paddingBottom:2}} onTouchStart={e=>e.stopPropagation()} onTouchMove={e=>e.stopPropagation()}>
        {d30.map((date,i)=>{
          const done=getVal(uid,date);
          const isT=date===tday;
          const d=new Date(date);
          const showM=i===0||new Date(d30[i-1]).getMonth()!==d.getMonth();
          return <div key={date} style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0,width:26}}>
            <div style={{fontSize:7,fontWeight:700,color:p.sub,height:10,display:'flex',alignItems:'center',opacity:showM?.9:0}}>{showM?MOS[d.getMonth()]:''}</div>
            <div style={{fontSize:8,color:isT?p.text:p.sub,fontWeight:isT?700:400,marginBottom:1,lineHeight:1}}>{WD[d.getDay()]}</div>
            <div onClick={isMe?()=>toggle(date):undefined}
              style={{width:22,height:22,borderRadius:7,
                background:done?p.dot:(isT?'rgba(0,0,0,.06)':'rgba(0,0,0,.08)'),
                border:isT?`1.5px solid ${p.dot}`:'1.5px solid transparent',
                cursor:isMe?'pointer':'default',
