<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{display:none;}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:none;opacity:1}}
@keyframes wiggle{0%,100%{transform:rotate(0deg)}20%{transform:rotate(-1.8deg)}40%{transform:rotate(1.8deg)}60%{transform:rotate(-1.4deg)}80%{transform:rotate(1.4deg)}}
.no-select{-webkit-user-select:none!important;user-select:none!important;-webkit-touch-callout:none!important;}
.no-select *{-webkit-user-select:none!important;user-select:none!important;}
.wiggle{animation:wiggle .35s ease-in-out infinite;}
@keyframes slideL{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:none}}
@keyframes slideR{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:none}}
.sl{animation:slideL .32s cubic-bezier(.22,1,.36,1)}
.sr{animation:slideR .32s cubic-bezier(.22,1,.36,1)}

*{-webkit-tap-highlight-color:transparent;}
body{-webkit-user-select:none;user-select:none;}
input,textarea,select,button{-webkit-user-select:text!important;user-select:text!important;}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,createContext,useContext}=React;

/* ===== THEME ===== */
const BL='blur(24px) saturate(180%)';
const LT={bg:'#f2f2f7',card:'#fff',card2:'rgba(0,0,0,.05)',text:'#1c1c1e',sub:'#636366',muted:'#aeaeb2',sep:'rgba(0,0,0,.08)',ctrl:'rgba(0,0,0,.07)',ctrlTxt:'#3c3c43',pill:'#1c1c1e',pillTxt:'#fff',glass:'rgba(255,255,255,.75)',tb:'rgba(242,242,247,.94)',ton:'#1c1c1e',toff:'#8e8e93',sh:'rgba(0,0,0,.1)',ib:'rgba(0,0,0,.12)'};
const DT={bg:'#000',card:'#1c1c1e',card2:'rgba(255,255,255,.07)',text:'#fff',sub:'rgba(235,235,245,.55)',muted:'#48484a',sep:'rgba(255,255,255,.1)',ctrl:'rgba(255,255,255,.1)',ctrlTxt:'rgba(255,255,255,.8)',pill:'#fff',pillTxt:'#000',glass:'rgba(28,28,30,.82)',tb:'rgba(18,18,18,.94)',ton:'#fff',toff:'#48484a',sh:'rgba(0,0,0,.4)',ib:'rgba(255,255,255,.18)'};
const PL=[{bg:'#ede9ff',text:'#3d2f80',sub:'#8b7fc0',dot:'#9b8fcc'},{bg:'#d9f5ec',text:'#1a5c42',sub:'#4d9e7e',dot:'#68c4a0'},{bg:'#fde8d8',text:'#7a3614',sub:'#c07050',dot:'#e8906a'},{bg:'#fef5cc',text:'#5c4a00',sub:'#a08830',dot:'#d4b84a'},{bg:'#daeeff',text:'#0b4275',sub:'#4a82b8',dot:'#72aad8'},{bg:'#fce4ef',text:'#7a1a40',sub:'#c0507a',dot:'#e07aaa'}];
const PD=[{bg:'#2a2244',text:'#c4b8f8',sub:'#9b8fcc',dot:'#b0a4e8'},{bg:'#182e24',text:'#7deec0',sub:'#4d9e7e',dot:'#68c4a0'},{bg:'#361c10',text:'#f0b090',sub:'#b06848',dot:'#e08060'},{bg:'#302600',text:'#f0d070',sub:'#987820',dot:'#c8a030'},{bg:'#0c1e32',text:'#90c8f0',sub:'#4a82b8',dot:'#72aad8'},{bg:'#340c1e',text:'#f09ab8',sub:'#b04870',dot:'#e078a0'}];
const CLABELS=['Лаванда','Мята','Персик','Жёлтый','Голубой','Роза'];
const Cx=createContext(null);
const useT=()=>useContext(Cx);

/* ===== CONSTANTS ===== */
const SR=[{l:'1 мин',ms:6e4},{l:'10 мин',ms:6e5},{l:'1 день',ms:864e5},{l:'1 нед',ms:6048e5},{l:'1 мес',ms:2592e6},{l:'6 мес',ms:15552e6}];
const RECURS=[{v:'none',l:'Без повтора'},{v:'daily',l:'Каждый день'},{v:'weekly',l:'Каждую нед.'},{v:'monthly',l:'Каждый мес.'},{v:'yearly',l:'Каждый год'}];
const WD=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
const MOS=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
const MOF=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const mkDates=n=>Array.from({length:n},(_,i)=>{const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-(n-1-i));return d.toDateString();});
const ensDays=(h,dates)=>{const ex=new Set((h.days||[]).map(d=>d.date));const m=[...(h.days||[])];dates.forEach(d=>{if(!ex.has(d))m.push({date:d,state:null});});const k=new Set(dates);return{...h,days:m.filter(d=>k.has(d.date))};};
const ld=(k,d)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const fmtMs=ms=>{if(ms<=0)return'Сейчас';const m=Math.round(ms/6e4);if(m<60)return m+' мин';const h=Math.round(m/60);if(h<24)return h+' ч';return Math.round(h/24)+' д';};
const tod=()=>new Date().toDateString();
const isInteractiveEl=el=>!!(el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.tagName==='BUTTON'||el.tagName==='SELECT'));

/* ===== ICONS (inline SVG components) ===== */
const Ic=(d,extra='')=>{
  const fn=({c='currentColor',s=20,sw=1.8})=>React.createElement('svg',{width:s,height:s,viewBox:'0 0 24 24',fill:'none',stroke:c,strokeWidth:sw,strokeLinecap:'round',strokeLinejoin:'round',dangerouslySetInnerHTML:{__html:d+extra}});
  return fn;
};
const IcPlus   =Ic('<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>');
const IcX      =Ic('<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>');
const IcCheck  =Ic('<polyline points="20 6 9 17 4 12"/>');
const IcPencil =Ic('<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>');
const IcTrash  =Ic('<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>');
const IcShuffle=Ic('<polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>');
const IcList   =Ic('<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>');
const IcStack  =Ic('<rect x="2" y="7" width="20" height="14" rx="2"/>','<path d="M16 3H8L6 7h12z" fill="currentColor" stroke="none" opacity=".5"/>');
const IcCal    =Ic('<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>');
const IcLeaf   =Ic('<path d="M2 22c5-5 8-9 14-14C14 3 8 5 5 9s-3 9-3 13z"/><line x1="2" y1="22" x2="12" y2="12"/>');
const IcFlame  =Ic('<path d="M8.5 14.5A6 6 0 0 0 18 9c0-4-4-6-4-6-1 4-3.5 5.5-5.5 7A4 4 0 0 0 6 14a4 4 0 0 0 2.5.5z"/>');
const IcSun    =Ic('<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>');
const IcMoon   =Ic('<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>');
const IcRepeat =Ic('<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>');
const IcBrain  =Ic('<path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 4.44-1.14M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-4.44-1.14"/>');
const IcChevL  =Ic('<polyline points="15 18 9 12 15 6"/>');
const IcChevR  =Ic('<polyline points="9 18 15 12 9 6"/>');
const IcChevU  =Ic('<polyline points="18 15 12 9 6 15"/>');
const IcChevD  =Ic('<polyline points="6 9 12 15 18 9"/>');

/* ===== SHARED UI ===== */
function GlassBtn({onClick,children,danger,style={}}){
  const{T,ui}=useT();
  const bg=danger?'rgba(255,59,48,.1)':'rgba(120,120,128,.1)';
  const col=danger?'#ff3b30':T.ctrlTxt;
  return <button onClick={onClick} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6,padding:ui.isPhone?'9px 15px':'7px 13px',borderRadius:ui.isPhone?13:11,border:'0.5px solid '+(danger?'rgba(255,59,48,.22)':T.sep),background:bg,backdropFilter:BL,WebkitBackdropFilter:BL,color:col,fontSize:ui.isPhone?15:13,fontWeight:600,cursor:'pointer',transition:'all .18s',...style}}>{children}</button>;
}
function Pill({onClick,active,children,style={}}){
  const{T,ui}=useT();
  return <button onClick={onClick} style={{display:'inline-flex',alignItems:'center',gap:6,padding:ui.isPhone?'9px 15px':'7px 13px',borderRadius:ui.isPhone?24:22,border:'0.5px solid '+(active?'transparent':T.sep),background:active?T.pill:'rgba(120,120,128,.1)',backdropFilter:BL,WebkitBackdropFilter:BL,color:active?T.pillTxt:T.ctrlTxt,fontSize:ui.isPhone?15:13,fontWeight:600,cursor:'pointer',transition:'all .2s',flexShrink:0,...style}}>{children}</button>;
}
function PlusBtn({onClick,active}){
  const{T,ui}=useT();
  const size=ui.isPhone?40:34;
  return <button onClick={onClick} style={{width:size,height:size,borderRadius:ui.isPhone?12:10,border:'0.5px solid '+T.sep,background:active?'rgba(120,120,128,.1)':T.pill,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',backdropFilter:BL,WebkitBackdropFilter:BL,transition:'all .18s',flexShrink:0}}>
    {active?<IcX c={T.ctrlTxt} s={ui.isPhone?18:16} sw={2}/>:<IcPlus c={T.pillTxt} s={ui.isPhone?18:16} sw={2}/>}
  </button>;
}
function Swatches({value,onChange}){
  const{dark}=useT();
  const P=dark?PD:PL;
  return <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'center'}}>
    {P.map((p,i)=><div key={i} onClick={()=>onChange(i)} title={CLABELS[i]} style={{width:30,height:30,borderRadius:'50%',background:p.dot,cursor:'pointer',transition:'all .2s',transform:value===i?'scale(1.25)':'scale(1)',boxShadow:value===i?('0 0 0 2.5px #fff,0 0 0 4px '+p.dot):'none'}}/>)}
  </div>;
}
function Sheet({onClose,children}){
  const{T,ui}=useT();
  return <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,.42)',display:'flex',alignItems:'flex-end',justifyContent:'center',backdropFilter:'blur(4px)'}}>
    <div style={{background:T.glass,backdropFilter:BL,WebkitBackdropFilter:BL,borderRadius:'24px 24px 0 0',width:'100%',maxWidth:ui.isPhone?'100%':600,border:'0.5px solid '+T.sep,animation:'slideUp .26s cubic-bezier(.32,1,.64,1)',maxHeight:'88vh',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'12px 0 0',display:'flex',justifyContent:'center',flexShrink:0}}><div style={{width:36,height:4,borderRadius:2,background:'rgba(120,120,128,.3)'}}/></div>
      <div style={{overflowY:'auto',padding:ui.isPhone?'16px 16px 34px':'14px 20px 36px',flex:1}}>{children}</div>
    </div>
  </div>;
}
function IaStyle(T,ui){return {width:'100%',border:'0.5px solid '+T.ib,borderRadius:ui.isPhone?16:14,padding:ui.isPhone?'13px 16px':'11px 14px',background:'rgba(120,120,128,.08)',color:T.text,outline:'none',resize:'none',lineHeight:1.5,fontFamily:'inherit'};}
function SectionLabel({children}){
  const{T,ui}=useT();
  return <div style={{fontSize:ui.isPhone?12:11,fontWeight:700,letterSpacing:1.8,color:T.muted,textTransform:'uppercase',marginBottom:11}}>{children}</div>;
}

/* ===== EDIT TASK SHEET ===== */
function EditTaskSheet({task,onSave,onDelete,onToHabit,onClose}){
  const{T,ui}=useT();
  const[text,setText]=useState(task.text);
  const[notes,setNotes]=useState(task.notes||'');
  const[recur,setRecur]=useState(task.recur||'none');
  const[ci,setCi]=useState(task.colorIdx??0);
  const ia=IaStyle(T,ui);
  return <Sheet onClose={onClose}>
    <SectionLabel>Задача</SectionLabel>
    <textarea value={text} onChange={e=>setText(e.target.value)} style={{...ia,minHeight:52,fontSize:17,fontWeight:600,marginBottom:10}}/>
    <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Примечание..." style={{...ia,minHeight:48,fontSize:14,marginBottom:14}}/>
    <SectionLabel>Повтор</SectionLabel>
    <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:16}}>{RECURS.map(r=><GlassBtn key={r.v} onClick={()=>setRecur(r.v)} style={recur===r.v?{background:T.pill,color:T.pillTxt}:{}}>{r.l}</GlassBtn>)}</div>
    <SectionLabel>Цвет</SectionLabel>
    <div style={{marginBottom:20}}><Swatches value={ci} onChange={setCi}/></div>
    <button onClick={()=>{if(text.trim())onSave(text.trim(),notes,recur,ci);}} style={{width:'100%',padding:13,borderRadius:14,border:'none',background:T.pill,color:T.pillTxt,fontSize:16,fontWeight:600,cursor:'pointer',marginBottom:11}}>Сохранить</button>
    <div style={{display:'flex',gap:8,alignItems:'stretch'}}>
      <GlassBtn onClick={onToHabit} style={{flex:1,padding:12,minWidth:0,whiteSpace:'nowrap'}}><IcLeaf c="#68c4a0" s={ui.isPhone?17:15}/> В привычки</GlassBtn>
      <GlassBtn onClick={onDelete} danger style={{flex:1,padding:12,minWidth:0,whiteSpace:'nowrap'}}><IcTrash c="#ff3b30" s={ui.isPhone?17:15}/> Удалить</GlassBtn>
    </div>
  </Sheet>;
}

/* ===== EDIT HABIT SHEET ===== */
/* ===== WIDGET COMPONENTS ===== */
function Sparkline({values,color,width=120,height=32}){
  if(!values||values.filter(v=>v>0).length<2)return null;
  const nonzero=values.filter(v=>v>0);
  const max=Math.max(...nonzero);const min=0;const range=max||1;
  const pts=values.map((v,i)=>(i/(values.length-1)*width)+','+(height-(v/range)*(height-4)-2)).join(' ');
  const last=values.length-1;
  const lx=last/(values.length-1)*width;
  const ly=height-(values[last]/range)*(height-4)-2;
  return <svg width={width} height={height} viewBox={'0 0 '+width+' '+height} style={{overflow:'visible'}}>
    <polyline points={pts} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" opacity=".75"/>
    {values[last]>0&&<circle cx={lx} cy={ly} r="3" fill={color}/>}
  </svg>;
}

function MoodWidget({habit,date,p,onValue,small=false}){
  const MOODS=[
    {v:1,e:'☹',l:'Плохо'},
    {v:2,e:'◔',l:'Так себе'},
    {v:3,e:'○',l:'Норм'},
    {v:4,e:'☺',l:'Хорошо'},
    {v:5,e:'★',l:'Отлично'},
  ];
  const dayData=(habit.days||[]).find(d=>d.date===date);
  const val=dayData?.value||0;
  // Last 14 days for mini chart
  const history=Array.from({length:14},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(13-i));
    return (habit.days||[]).find(x=>x.date===d.toDateString())?.value||0;
  });

  function pick(v){onValue(habit.id,date,v===val?0:v);}

  if(small)return <div style={{display:'flex',gap:4,userSelect:'none'}}>
    {MOODS.map(m=><button key={m.v}
      onPointerDown={e=>e.stopPropagation()}
      onTouchEnd={e=>{e.preventDefault();e.stopPropagation();pick(m.v);}}
      onClick={e=>{e.stopPropagation();pick(m.v);}}
      style={{width:28,height:28,borderRadius:8,border:'1.5px solid '+(val===m.v?p.dot:'rgba(128,128,128,.2)'),background:val===m.v?(p.dot+'22'):'transparent',cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',touchAction:'manipulation',WebkitTapHighlightColor:'transparent',transition:'all .15s'}}
    >{m.e}</button>)}
  </div>;

  return <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14,width:'100%',userSelect:'none'}}>
    <div style={{display:'flex',gap:10}}>
      {MOODS.map(m=><button key={m.v}
        onPointerDown={e=>e.preventDefault()}
        onClick={()=>pick(m.v)}
        style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'8px 10px',borderRadius:14,border:'1.5px solid '+(val===m.v?p.dot:'rgba(128,128,128,.15)'),background:val===m.v?(p.dot+'20'):'rgba(0,0,0,.05)',cursor:'pointer',transition:'all .2s',touchAction:'manipulation'}}
      >
        <span style={{fontSize:24}}>{m.e}</span>
        <span style={{fontSize:9,color:val===m.v?p.text:p.sub,fontWeight:val===m.v?700:400}}>{m.l}</span>
      </button>)}
    </div>
    {/* History dots */}
    {history.some(v=>v>0)&&<div style={{display:'flex',gap:4,alignItems:'flex-end'}}>
      {history.map((v,i)=>{
        const m=MOODS.find(x=>x.v===v);
        return <div key={i} style={{textAlign:'center',opacity:i===13?1:.65}}>
          <div style={{fontSize:i===13?16:12}}>{v>0?m?.e:'В·'}</div>
        </div>;
      })}
    </div>}
    <div style={{fontSize:11,color:p.sub,opacity:.5}}>Свайп → чтобы отметить выполненным</div>
  </div>;
}

function CounterWidget({habit,date,p,onValue,small=false}){
  const days=habit.days||[];
  const dayData=days.find(d=>d.date===date);
  const savedVal=dayData?.value??null;
  const goal=habit.widget?.goal||0;
  const unit=habit.widget?.unit||'';
  const numVal=Number(savedVal)||0;
  const pct=goal>0?Math.min(numVal/goal,1):0;
  const[inputVal,setInputVal]=useState(savedVal!=null?String(savedVal):'');
  // Sync when date/habit changes
  React.useEffect(()=>{setInputVal(savedVal!=null?String(savedVal):'');},[date,habit.id,savedVal]);

  function commit(v){
    const n=parseFloat(String(v).replace(',','.'));
    if(!isNaN(n)&&n>=0)onValue(habit.id,date,n);
  }

  // Last 14 days bar chart
  const history=Array.from({length:14},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(13-i));
    return (habit.days||[]).find(x=>x.date===d.toDateString())?.value||0;
  });
  const histMax=Math.max(...history,1);
  const hasHistory=history.some(v=>v>0);

  if(small)return <div style={{display:'flex',alignItems:'center',gap:8,userSelect:'none'}}>
    <div style={{display:'flex',alignItems:'center',gap:4,background:'rgba(0,0,0,.08)',borderRadius:10,padding:'4px 8px'}}>
      <input
        type="number" inputMode="decimal"
        value={inputVal}
        placeholder="0"
        onPointerDown={e=>e.stopPropagation()}
        onTouchStart={e=>e.stopPropagation()}

          <div style={{width:(pct*100)+'%',height:'100%',background:p.dot,borderRadius:2,transition:'width .3s'}}/>
        </div>
      </div>}
    </div>
    {hasHistory&&<div style={{width:'100%',paddingTop:4}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:p.sub,marginBottom:5}}>
        <span>14 дней</span>

      <div style={{display:'flex',alignItems:'flex-end',gap:2,height:36}}>
        {history.map((v,i)=>{
          const barH=v>0?Math.max(4,Math.round(v/histMax*32)):2;
          const isToday=i===13;
          return <div key={i} style={{flex:1,position:'relative',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',height:36}}>
            {isToday&&v>0&&<div style={{fontSize:9,color:p.text,marginBottom:2,fontWeight:700,whiteSpace:'nowrap'}}>{v}</div>}
            <div style={{width:'100%',height:barH,borderRadius:3,background:isToday?p.dot:v>0?(p.dot+'55'):'rgba(128,128,128,.12)',transition:'height .3s'}}/>
          </div>;
        })}
      </div>
    </div>}
    <div style={{fontSize:11,color:p.sub,opacity:.45}}>Свайп → чтобы отметить выполненным</div>
  </div>;
}

function PomodoroWidget({habit,date,p,onDone,small=false}){
  const workSec=(habit.widget?.workMin||25)*60;
  const breakSec=(habit.widget?.breakMin||5)*60;
  const maxSess=habit.widget?.sessions||4;
  const[phase,setPhase]=useState('idle');
  const[sec,setSec]=useState(workSec);
  const[sess,setSess]=useState(0);
  const timerRef=useRef(null);
  function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
  function clearT(){if(timerRef.current){clearInterval(timerRef.current);timerRef.current=null;}}
  function startWork(){
    clearT();setPhase('work');
    timerRef.current=setInterval(()=>setSec(s=>{
      if(s<=1){clearT();setSess(n=>{const nx=n+1;if(nx>=maxSess){setPhase('done');setSec(0);if(onDone)onDone();return nx;}setPhase('break');setSec(breakSec);timerRef.current=setInterval(()=>setSec(s2=>{if(s2<=1){clearT();startWork();return 0;}return s2-1;}),1000);return nx;});return 0;}return s-1;}),1000);
  }
  function toggle(){if(timerRef.current){clearT();setPhase('idle');}else{if(phase==='idle'||phase==='work')startWork();}}
  function reset(){clearT();setPhase('idle');setSec(workSec);setSess(0);}
  useEffect(()=>()=>clearT(),[]);
  const running=!!timerRef.current;
  const displaySec=phase==='idle'?workSec:sec;
  const pct=phase==='work'?1-sec/workSec:phase==='break'?1-sec/breakSec:phase==='done'?1:0;
  const col=phase==='break'?'#30d158':phase==='done'?p.dot:p.dot;
  const r=small?14:30;const circ=2*Math.PI*r;

  if(small)return <div style={{display:'flex',alignItems:'center',gap:8,userSelect:'none',WebkitUserSelect:'none'}}>
    <svg width={r*2+6} height={r*2+6} viewBox={'0 0 '+(r*2+6)+' '+(r*2+6)} style={{flexShrink:0}}>
      <circle cx={r+3} cy={r+3} r={r} fill="none" stroke="rgba(128,128,128,.2)" strokeWidth="3"/>
      <circle cx={r+3} cy={r+3} r={r} fill="none" stroke={col} strokeWidth="3" strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} transform={'rotate(-90 '+(r+3)+' '+(r+3)+')'} style={{transition:'stroke-dashoffset .5s'}}/>
    </svg>
    <div style={{minWidth:44}}>
      <div style={{fontSize:15,fontWeight:700,color:p.text,fontVariantNumeric:'tabular-nums'}}>{fmt(displaySec)}</div>
      <div style={{fontSize:10,color:p.sub}}>{phase==='done'?'Готово':phase==='break'?'Перерыв':'Сессия '+(sess+1)+'/'+maxSess}</div>
    </div>
    {phase!=='done'&&<button onPointerDown={e=>e.stopPropagation()} onTouchEnd={e=>{e.preventDefault();e.stopPropagation();toggle();}} onClick={e=>{e.stopPropagation();toggle();}} style={{width:32,height:32,borderRadius:10,background:p.dot,border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',touchAction:'manipulation',WebkitTapHighlightColor:'transparent'}}>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="#fff">{running?<><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></>:<polygon points="5,3 19,12 5,21"/>}</svg>
    </button>}
  </div>;

  return <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14,userSelect:'none',WebkitUserSelect:'none'}}>
    <div style={{position:'relative',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <svg width={r*2+20} height={r*2+20} viewBox={'0 0 '+(r*2+20)+' '+(r*2+20)}>
        <circle cx={r+10} cy={r+10} r={r} fill="none" stroke="rgba(128,128,128,.15)" strokeWidth="6"/>
        <circle cx={r+10} cy={r+10} r={r} fill="none" stroke={col} strokeWidth="6" strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} transform={'rotate(-90 '+(r+10)+' '+(r+10)+')'} style={{transition:'stroke-dashoffset .5s'}}/>
      </svg>
      <div style={{position:'absolute',textAlign:'center'}}>
        <div style={{fontSize:36,fontWeight:700,color:p.text,fontVariantNumeric:'tabular-nums',letterSpacing:'-1px'}}>{fmt(displaySec)}</div>
        <div style={{fontSize:11,color:p.sub,marginTop:1}}>{phase==='done'?'Готово!':phase==='break'?'Перерыв':'сессия '+(sess+1)+'/'+maxSess}</div>
      </div>
    </div>
    <div style={{display:'flex',gap:8}}>
      {phase!=='done'&&<button onPointerDown={e=>e.preventDefault()} onClick={toggle} style={{padding:'10px 22px',borderRadius:14,background:running?'rgba(255,255,255,.1)':p.dot,border:running?'1px solid rgba(255,255,255,.2)':'none',color:running?p.sub:'#fff',fontSize:15,fontWeight:600,cursor:'pointer',touchAction:'manipulation'}}>{running?'Пауза':'Старт'}</button>}
      {(sess>0||phase!=='idle')&&<button onPointerDown={e=>e.preventDefault()} onClick={reset} style={{padding:'10px 16px',borderRadius:14,background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.12)',color:p.sub,fontSize:15,cursor:'pointer',touchAction:'manipulation'}}>↻</button>}
    </div>
    <div style={{display:'flex',gap:6}}>{Array.from({length:maxSess},(_,i)=><div key={i} style={{width:8,height:8,borderRadius:'50%',background:i<sess?p.dot:'rgba(128,128,128,.2)',transition:'background .3s'}}/>)}</div>
  </div>;
}

function TinderStack({items,onRight,onLeft,onUp,onTap,renderCard,shufflePhase,leftLabel='Позже',leftColor='#ff3b30'}){
  const cardRef=useRef(null);
  const[dx,setDx]=useState(0);
  const[dy,setDy]=useState(0);
  // Use refs for reliable tap detection - state updates are async so closures see stale values
  const dxRef=useRef(0);
  const dyRef=useRef(0);
  const stRef=useRef(null);
  const[fly,setFly]=useState(null);
  const{dark}=useT();
  const P=dark?PD:PL;
  const pof=n=>P[Math.min(Math.max(n||0,0),P.length-1)];
  const top=items[0],sec=items[1],thr=items[2];
  const busy=!!shufflePhase||!!fly;
  const FAN=[
    {r:-11,x:-34,y:12},
    {r:-6,x:-18,y:6},
    {r:0,x:0,y:0},
    {r:6,x:18,y:6},
    {r:11,x:34,y:12},
  ];

  function dn(e){
    if(busy)return;
    // Don't start drag if touching an interactive element
    const t=e.target||e.srcElement;
    if(isInteractiveEl(t))return;
    const x=e.clientX??e.touches?.[0]?.clientX;
    const y=e.clientY??e.touches?.[0]?.clientY;
    stRef.current={x,y};
    dxRef.current=0; dyRef.current=0;
    setDx(0); setDy(0);
  }
  function mv(e){
    if(!stRef.current||busy)return;
    const nx=(e.clientX??e.touches?.[0]?.clientX)-stRef.current.x;
    const ny=(e.clientY??e.touches?.[0]?.clientY)-stRef.current.y;
    dxRef.current=nx; dyRef.current=ny;
    setDx(nx); setDy(ny);
  }
  function up(){
    if(!stRef.current)return;
    const cx=dxRef.current, cy=dyRef.current;
    stRef.current=null;
    if(cx>65)doFly('right');
    else if(cx<-65)doFly('left');
    else if(cy<-65&&Math.abs(cx)<60&&onUp)fly_up();
    else{
      if(Math.abs(cx)<12&&Math.abs(cy)<12&&onTap)onTap(top);
      dxRef.current=0; dyRef.current=0;
      setDx(0); setDy(0);
    }
  }
  function doFly(dir){setFly(dir);dxRef.current=0;dyRef.current=0;setDx(0);setDy(0);setTimeout(()=>{if(dir==='right')onRight(top);else onLeft(top);setFly(null);},360);}
  function fly_up(){setFly('up');dxRef.current=0;dyRef.current=0;setDx(0);setDy(0);setTimeout(()=>{if(onUp)onUp(top);setFly(null);},340);}
  // Non-passive touchmove so preventDefault works on mobile (prevents page scroll during swipe)
  useEffect(()=>{
    const el=cardRef.current;
    if(!el)return;
    const handler=e=>{
      const t=e.target;
      // Don't intercept touches on interactive elements
      if(isInteractiveEl(t))return;
      if(e.touches[0]&&stRef.current){e.preventDefault();mv(e.touches[0]);}
    };
    el.addEventListener('touchmove',handler,{passive:false});
    return()=>el.removeEventListener('touchmove',handler);
  },[!!top,!!shufflePhase]);

  if(!top)return null;
  const cp=pof(top.colorIdx);
  const drag=!!stRef.current&&!busy;

  if(shufflePhase){
    const fi=items.slice(0,Math.min(items.length,5));
    const isFan=shufflePhase==='fan';
    return <div style={{position:'relative',width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}>
      {fi.map((item,i)=>{
        const n=fi.length===1?2:Math.round(i*(4/Math.max(fi.length-1,1)));
        const f=FAN[n]||FAN[2];
        const p2=pof(item.colorIdx);
        return <div key={item.id} style={{
          position:'absolute',width:'84%',height:'84%',borderRadius:26,background:p2.bg,
          boxShadow:'0 12px 40px rgba(0,0,0,.18)',
          transform:isFan?('rotate('+f.r+'deg) translateX('+f.x+'px) translateY('+f.y+'px) scale(.93)'):'rotate(0deg) translateX(0px) translateY(0px) scale(1)',
          transition:isFan?'transform .55s cubic-bezier(.4,0,.2,1)':'transform .45s cubic-bezier(.4,0,.2,1)',
          zIndex:fi.length-i,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',
        }}>
          {i===0&&<div style={{fontSize:15,fontWeight:700,color:p2.text,padding:'0 22px',textAlign:'center',opacity:isFan?1:0,transition:'opacity .2s .1s'}}>{item.text}</div>}
        </div>;
      })}
    </div>;
  }

  return <div style={{position:'relative',width:'100%',height:'100%',userSelect:'none'}}>
    {thr&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
      <div style={{width:'calc(100% - 44px)',height:'100%',borderRadius:28,background:pof(thr.colorIdx).bg,transform:'scale(.88) translateY('+(drag?-12:0)+'px)',transition:drag?'none':'transform .3s ease'}}/>
    </div>}
    {sec&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
      <div style={{width:'calc(100% - 22px)',height:'100%',borderRadius:28,background:pof(sec.colorIdx).bg,transform:'scale(.94) translateY('+(drag?-20:0)+'px)',transition:drag?'none':'transform .3s ease',boxShadow:'0 4px 24px rgba(0,0,0,.12)'}}/>
    </div>}
    <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div ref={cardRef} onMouseDown={dn} onMouseMove={mv} onMouseUp={up} onMouseLeave={()=>{if(stRef.current){const cx=dxRef.current,cy=dyRef.current;stRef.current=null;if(cx>65)doFly('right');else if(cx<-65)doFly('left');else if(cy<-65&&Math.abs(cx)<60&&onUp)fly_up();else{dxRef.current=0;dyRef.current=0;setDx(0);setDy(0);}}}}
        onTouchStart={e=>dn(e.touches[0])} onTouchEnd={up}
        style={{width:'100%',height:'100%',borderRadius:28,background:cp.bg,
          touchAction:'none',WebkitUserSelect:'none',userSelect:'none',
          boxShadow:dx>40?'0 18px 52px rgba(48,209,88,.24)':dx<-40?'0 18px 52px rgba(255,59,48,.2)':'0 16px 52px rgba(0,0,0,.15)',
          cursor:fly?'default':'grab',position:'relative',overflow:'hidden',
          transform:fly==='right'?'translateX(160vw) rotate(26deg)':fly==='left'?'translateX(-160vw) rotate(-26deg)':fly==='up'?'translateY(-120vh) scale(.8)':('translateX('+dx+'px) translateY('+(dy*.08)+'px) rotate('+(dx*.05)+'deg)'),
          transition:fly||!stRef.current?'transform .34s cubic-bezier(.25,.46,.45,.94),box-shadow .15s':'box-shadow .15s',
        }}>
        {dx>30&&<div style={{position:'absolute',inset:0,borderRadius:28,background:'rgba(48,209,88,.1)',display:'flex',alignItems:'flex-start',justifyContent:'flex-end',padding:20,pointerEvents:'none',opacity:Math.min((dx-30)/60,1)}}>
          <div style={{background:'#30d158',borderRadius:50,padding:'7px 14px',display:'flex',alignItems:'center',gap:6}}><IcCheck c="#fff" s={14} sw={2.5}/><span style={{color:'#fff',fontSize:13,fontWeight:700}}>Готово</span></div>
        </div>}
        {dx<-30&&<div style={{position:'absolute',inset:0,borderRadius:28,background:'rgba(255,59,48,.08)',display:'flex',alignItems:'flex-start',justifyContent:'flex-start',padding:20,pointerEvents:'none',opacity:Math.min((-dx-30)/60,1)}}>
          <div style={{background:leftColor,borderRadius:50,padding:'7px 14px',display:'flex',alignItems:'center',gap:6}}><IcX c="#fff" s={14} sw={2.5}/><span style={{color:'#fff',fontSize:13,fontWeight:700}}>{leftLabel}</span></div>
        </div>}
        {renderCard(top,dx)}
      </div>
    </div>
  </div>;
}

/* ===== DAY STRIP ===== */
function DayStrip({habit,dates30,onToggle}){
  const{dark}=useT();
  const P=dark?PD:PL;
  const p=P[Math.min(Math.max(habit.colorIdx||0,0),P.length-1)];
  const tday=tod();
  const ref=useRef(null);
  useEffect(()=>{if(ref.current)ref.current.scrollLeft=ref.current.scrollWidth;},[]);
  return <div ref={ref} style={{display:'flex',gap:3,overflowX:'auto',paddingBottom:2,paddingRight:16,scrollbarWidth:'none',msOverflowStyle:'none'}} onTouchStart={e=>e.stopPropagation()} onTouchMove={e=>e.stopPropagation()}>
    {dates30.map((date,i)=>{
      const dd=habit.days?.find(x=>x.date===date);const ddState=dd?.state||null;
      const isT=date===tday;
      const d=new Date(date);
      const showM=i===0||new Date(dates30[i-1]).getMonth()!==d.getMonth();
      return <div key={date} style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0,width:26}}>
        <div style={{fontSize:7,fontWeight:700,color:p.sub,height:10,display:'flex',alignItems:'center',opacity:showM?.9:0,textTransform:'uppercase'}}>{showM?MOS[d.getMonth()]:''}</div>
        <div style={{fontSize:8,color:isT?p.text:p.sub,fontWeight:isT?700:400,marginBottom:1,lineHeight:1}}>{WD[d.getDay()]}</div>
        <div onClick={()=>onToggle(habit.id,date)} style={{width:22,height:22,borderRadius:6,cursor:'pointer',flexShrink:0,border:'1.5px solid '+(ddState==='done'?p.dot:ddState==='failed'?'#ff453a':dd?.value>0?p.dot+'80':'rgba(128,128,128,.18)'),background:ddState==='done'?p.dot:ddState==='failed'?'rgba(255,69,58,.85)':dd?.value>0?(p.dot+'22'):dark?'rgba(255,255,255,.04)':'rgba(255,255,255,.4)',display:'flex',alignItems:'center',justifyContent:'center',outline:isT?'2px solid '+(ddState==='failed'?'#ff453a':p.dot):'none',outlineOffset:1,transition:'all .15s'}}>
          {ddState==='done'&&!dd?.value&&<IcCheck c="#fff" s={9} sw={2.5}/>}
          {ddState==='done'&&dd?.value>0&&<span style={{fontSize:7,fontWeight:700,color:'#fff',lineHeight:1}}>{dd.value>99?'99+':Math.round(dd.value)}</span>}
          {ddState==='failed'&&<IcX c="#fff" s={8} sw={2.5}/>}
          {!ddState&&dd?.value>0&&<span style={{fontSize:7,fontWeight:700,color:p.text,lineHeight:1}}>{dd.value>99?'99+':Math.round(dd.value)}</span>}
        </div>
      </div>;
    })}
  </div>;
}

/* ===== CALENDAR ===== */
function CalModal({habit,onClose,onToggle}){
  const{T,dark}=useT();
  const P=dark?PD:PL;
  const p=P[Math.min(Math.max(habit.colorIdx||0,0),P.length-1)];
  const tday=tod();
  const now=new Date();
  const[yr,setYr]=useState(now.getFullYear());
  const[mo,setMo]=useState(now.getMonth());
  const canNext=!(yr===now.getFullYear()&&mo===now.getMonth());
  const fd=new Date(yr,mo,1).getDay();
  const dim=new Date(yr,mo+1,0).getDate();
  const cells=[];
  for(let i=0;i<fd;i++)cells.push(null);
  for(let d=1;d<=dim;d++){const date=new Date(yr,mo,d).toDateString();cells.push({d,date,checked:habit.days?.find(x=>x.date===date)?.state==='done',isT:date===tday});}
  function prev(){if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1);}
  function next(){if(!canNext)return;if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);}
  return <Sheet onClose={onClose}>
    <div style={{fontSize:11,fontWeight:700,letterSpacing:1.8,color:T.muted,textTransform:'uppercase',marginBottom:8}}>{habit.text}</div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
      <button onClick={prev} style={{width:34,height:34,borderRadius:10,border:'0.5px solid '+T.sep,background:'rgba(120,120,128,.08)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><IcChevL c={T.text} s={18}/></button>
      <div style={{fontSize:17,fontWeight:700,color:T.text}}>{MOF[mo]} {yr}</div>
      <button onClick={next} style={{width:34,height:34,borderRadius:10,border:'0.5px solid '+T.sep,background:'rgba(120,120,128,.08)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',opacity:canNext?1:.3}}><IcChevR c={T.text} s={18}/></button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3,marginBottom:5}}>
      {WD.map(d=><div key={d} style={{textAlign:'center',fontSize:11,color:T.muted,fontWeight:600,padding:'2px 0'}}>{d}</div>)}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
      {cells.map((c,i)=>c===null?<div key={i}/>:
        <div key={i} onClick={()=>onToggle(habit.id,c.date)} style={{aspectRatio:'1',borderRadius:9,background:c.state==='done'?p.dot:c.state==='failed'?'rgba(255,69,58,.8)':c.isT?(p.dot+'22'):T.ctrl,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'all .15s',outline:c.isT?'2px solid '+(c.state==='failed'?'#ff453a':p.dot):'none',outlineOffset:2}}>
          <span style={{fontSize:15,fontWeight:c.isT?700:400,color:(c.state)?'#fff':T.text}}>{c.d}</span>
        </div>
      )}
    </div>
  </Sheet>;
}

const LIST_COLORS=['#9b8fcc','#68c4a0','#e8906a','#d4b84a','#72aad8','#e07aaa'];
function TaskListsView({tasks,setTasks,lists,setLists,dark,T}){
  const P=dark?PD:PL;
  const[expandedId,setExpandedId]=useState(null);
  const[addingList,setAddingList]=useState(false);
  const[newListName,setNewListName]=useState('');
  const[addingToList,setAddingToList]=useState(null); // list id
  const[newTaskText,setNewTaskText]=useState('');
  const pof=n=>P[Math.min(Math.max(n||0,0),P.length-1)];

  function createList(){
    if(!newListName.trim())return;
    const id=Date.now().toString();
    setLists(ls=>[...ls,{id,name:newListName.trim(),colorIdx:ls.length%6}]);
    setNewListName('');setAddingList(false);setExpandedId(id);
  }
  function addTaskToList(listId){
    if(!newTaskText.trim())return;
    setTasks(ts=>[...ts,{id:Date.now(),text:newTaskText.trim(),notes:'',recur:'none',done:false,reps:0,colorIdx:0,listId}]);
    setNewTaskText('');setAddingToList(null);
  }
  function toggleTaskDone(id){
    setTasks(ts=>ts.map(t=>{if(t.id!==id)return t;const done=!t.done;return{...t,done,reps:done?t.reps+1:Math.max(0,t.reps-1)};}));
  }
  function delTask(id){setTasks(ts=>ts.filter(t=>t.id!==id));}
  function delList(id){setLists(ls=>ls.filter(l=>l.id!==id));setTasks(ts=>ts.filter(t=>t.listId!==id));}

  return <div style={{flex:1,overflowY:'auto',paddingBottom:8}}>
    {lists.map(list=>{
      const listTasks=tasks.filter(t=>t.listId===list.id);
      const done=listTasks.filter(t=>t.done).length;
      const expanded=expandedId===list.id;
      const p=pof(list.colorIdx);
      return <div key={list.id} style={{background:p.bg,borderRadius:22,marginBottom:12,overflow:'hidden',boxShadow:'0 4px 20px rgba(0,0,0,.07)'}}>
        {/* Deck picker вЂ” assign card to deck */}
    {moveCard&&<Sheet onClose={()=>setMoveCard(null)}>
      <SectionLabel>Переместить в колоду</SectionLabel>
      <div style={{fontSize:15,fontWeight:600,color:T.text,marginBottom:16,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{moveCard.text}</div>
      {lists.map(l=>{
        const lp=(dark?PD:PL)[l.colorIdx||0];
        const isCurrentDeck=moveCard.listId===l.id;
        return <div key={l.id} onClick={()=>{setTasks(ts=>ts.map(t=>t.id===moveCard.id?{...t,listId:l.id}:t));setMoveCard(null);}} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 0',borderBottom:'0.5px solid '+T.sep,cursor:'pointer'}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill={lp.dot}><path d="M2 6a2 2 0 0 1 2-2h4l2 2h10a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6z" opacity=".9"/></svg>
          <span style={{flex:1,fontSize:16,fontWeight:600,color:T.text}}>{l.name}</span>
          {isCurrentDeck&&<IcCheck c={lp.dot} s={16} sw={2.5}/>}
        </div>;
      })}
      {moveCard.listId&&<GlassBtn onClick={()=>{setTasks(ts=>ts.map(t=>t.id===moveCard.id?{...t,listId:undefined}:t));setMoveCard(null);}} style={{width:'100%',marginTop:12,padding:12,justifyContent:'center',display:'flex',gap:6}}>
        Убрать из колоды
      </GlassBtn>}
      {lists.length===0&&<div style={{color:T.muted,fontSize:14,textAlign:'center',paddingTop:16}}>Сначала создай колоду в режиме Список</div>}
    </Sheet>}
    {/* Header */}
        <div onClick={()=>setExpandedId(expanded?null:list.id)} style={{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',cursor:'pointer'}}>
          <div style={{width:10,height:10,borderRadius:'50%',background:p.dot,flexShrink:0}}/>
          <div style={{flex:1}}>
            <div style={{fontSize:16,fontWeight:700,color:p.text}}>{list.name}</div>
            <div style={{fontSize:12,color:p.sub,marginTop:1}}>{done}/{listTasks.length} выполнено</div>
          </div>
          {/* Progress bar */}
          {listTasks.length>0&&<div style={{width:44,height:4,borderRadius:2,background:'rgba(0,0,0,.1)',overflow:'hidden'}}>
            <div style={{width:(done/listTasks.length*100)+'%',height:'100%',background:p.dot,borderRadius:2,transition:'width .3s'}}/>
          </div>}
          <div style={{fontSize:12,color:p.sub,transform:'rotate('+(expanded?-90:0)+'deg)',transition:'transform .2s'}}>›</div>
          <button onPointerDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();if(window.confirm('Удалить колоду и все задачи?'))delList(list.id);}} style={{background:'none',border:'none',color:p.dot,opacity:.4,cursor:'pointer',fontSize:16,padding:'0 2px'}}>✕</button>
        </div>
        {/* Tasks */}
        {expanded&&<div style={{borderTop:'1px solid rgba(0,0,0,.06)',padding:'8px 16px 12px'}}>
          {listTasks.map(task=><div key={task.id} style={{display:'flex',gap:10,alignItems:'center',padding:'7px 0',borderBottom:'0.5px solid rgba(0,0,0,.05)'}}>
            <div onClick={()=>toggleTaskDone(task.id)} style={{width:22,height:22,borderRadius:'50%',flexShrink:0,cursor:'pointer',border:'2px solid '+(task.done?'transparent':p.dot),background:task.done?p.dot:'transparent',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s'}}>
              {task.done&&<IcCheck c="#fff" s={10} sw={2.5}/>}
            </div>
            <div style={{flex:1,fontSize:15,fontWeight:500,color:p.text,textDecoration:task.done?'line-through':'none',opacity:task.done?.5:1}}>{task.text}</div>
            <button onClick={()=>delTask(task.id)} style={{background:'none',border:'none',color:p.dot,opacity:.35,cursor:'pointer',fontSize:14,padding:'0 2px'}}>✕</button>
          </div>)}
          {/* Add task to list */}
          {addingToList===list.id
            ?<div style={{display:'flex',gap:8,marginTop:10}}>
                <input autoFocus value={newTaskText} onChange={e=>setNewTaskText(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addTaskToList(list.id);if(e.key==='Escape'){setAddingToList(null);setNewTaskText('');}}} placeholder="Новая задача..." style={{flex:1,border:'none',borderBottom:'1px solid '+p.dot,outline:'none',background:'transparent',fontSize:15,color:p.text,padding:'4px 0'}}/>
                <button onClick={()=>addTaskToList(list.id)} style={{background:p.dot,border:'none',borderRadius:9,padding:'5px 12px',color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>Добавить</button>
                <button onClick={()=>{setAddingToList(null);setNewTaskText('');}} style={{background:'none',border:'none',color:p.sub,fontSize:18,cursor:'pointer'}}>✕</button>
              </div>
            :<button onClick={()=>setAddingToList(list.id)} style={{marginTop:10,background:'none',border:'none',color:p.sub,fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',gap:5,padding:0}}><IcPlus c={p.sub} s={14}/>Добавить задачу</button>}
        </div>}
      </div>;
    })}
    {/* Create list */}
    {addingList
      ?<div style={{background:T.glass,backdropFilter:'blur(16px)',borderRadius:20,padding:'14px 16px',border:'0.5px solid '+T.sep,animation:'scaleIn .2s ease'}}>
          <input autoFocus value={newListName} onChange={e=>setNewListName(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')createList();if(e.key==='Escape'){setAddingList(false);setNewListName('');}}} placeholder="Название колоды..." style={{width:'100%',border:'none',outline:'none',fontSize:16,background:'transparent',color:T.text,marginBottom:12}}/>
          <div style={{display:'flex',gap:6,marginBottom:12}}>
            {LIST_COLORS.map((c,i)=><div key={i} onClick={()=>setLists(ls=>{if(ls.find(l=>l.colorIdx===i))return ls;return ls;})} style={{width:26,height:26,borderRadius:'50%',background:c,cursor:'pointer'}}/>)}
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={createList} style={{flex:1,padding:10,borderRadius:12,border:'none',background:T.pill,color:T.pillTxt,fontSize:14,fontWeight:600,cursor:'pointer'}}>Создать</button>
            <button onClick={()=>{setAddingList(false);setNewListName('');}} style={{padding:10,borderRadius:12,border:'0.5px solid '+T.sep,background:'transparent',color:T.ctrlTxt,fontSize:14,cursor:'pointer'}}>Отмена</button>
          </div>
        </div>
      :<button onClick={()=>setAddingList(true)} style={{width:'100%',padding:'12px',borderRadius:16,border:'1.5px dashed rgba(128,128,128,.25)',background:'transparent',color:T.muted,fontSize:14,fontWeight:500,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:7}}><IcPlus c={T.muted} s={14}/>Новая колода</button>}
  </div>;
}


function FolderIcon({color,size=22}){

    <path d="M2 6a2 2 0 0 1 2-2h4l2 2h10a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6z" opacity=".9"/>
  </svg>;
}

function DailyTab({tasks,setTasks,lists,setLists,convertToHabit,dark,onToggleDark}){
  const{T,ui}=useT();
  const P=dark?PD:PL;
  const pof=n=>P[Math.min(Math.max(n||0,0),P.length-1)];
  const[recur,setRecur]=useState('none');
  const[addText,setAddText]=useState('');
  const[adding,setAdding]=useState(false);
  const[listView,setListView]=useState(false);
  const[sp,setSp]=useState(null);
  const[edit,setEdit]=useState(null);
  const[openFolderId,setOpenFolderId]=useState(null);
  const[moveCard,setMoveCard]=useState(null); // card to move to a deck
  const[addingFolder,setAddingFolder]=useState(false);
  const[newFolderName,setNewFolderName]=useState('');
  const[editDeck,setEditDeck]=useState(null);
  const[editDeckName,setEditDeckName]=useState('');
  const[editDeckColorIdx,setEditDeckColorIdx]=useState(0);
  const rl={none:null,daily:'↺ Каждый день',weekly:'↺ Каждую нед.',monthly:'↺ Каждый мес.',yearly:'↺ Каждый год'};

  const activeTasks=openFolderId
    ?tasks.filter(t=>t.listId===openFolderId)
    :tasks.filter(t=>!t.listId);
  const undone=activeTasks.filter(t=>!t.done);
  const done=activeTasks.filter(t=>t.done);
  const openFolder=lists.find(l=>l.id===openFolderId);

  function add(){
    if(!addText.trim())return;
    const newTask={id:Date.now(),text:addText.trim(),notes:'',recur,done:false,reps:0,colorIdx:0};
    if(openFolderId)newTask.listId=openFolderId;
    setTasks(ts=>[newTask,...ts]);setAddText('');setAdding(false);
  }
  function swR(card){setTasks(ts=>ts.map(t=>t.id===card.id?{...t,done:true,reps:t.reps+1,lastDone:new Date().toISOString()}:t));}
  function swL(card){setTasks(ts=>{const o=ts.filter(t=>t.id!==card.id);return[...o.filter(t=>!t.done),card,...o.filter(t=>t.done)];});}
  function shuffle(){
    if(sp||undone.length<2)return;
    setSp('fan');
    setTimeout(()=>{
      setTasks(ts=>{
        const a=[...ts];const ids=undone.map(t=>t.id);
        const idxs=ids.map(id=>a.findIndex(t=>t.id===id)).filter(i=>i>=0);
        if(idxs.length<2)return ts;
        const vals=idxs.map(i=>a[i]);
        for(let i=vals.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[vals[i],vals[j]]=[vals[j],vals[i]];}
        idxs.forEach((idx,i)=>a[idx]=vals[i]);return a;
      });
      setSp('collapse');setTimeout(()=>setSp(null),500);
    },600);
  }
  function saveEdit(id,text,notes,recur,ci){setTasks(ts=>ts.map(t=>t.id===id?{...t,text,notes,recur,colorIdx:ci}:t));setEdit(null);}
  function del(id){setTasks(ts=>ts.filter(t=>t.id!==id));setEdit(null);}
  function toggle(id){setTasks(ts=>ts.map(t=>{if(t.id!==id)return t;const d=!t.done;return{...t,done:d,reps:d?t.reps+1:Math.max(0,t.reps-1),lastDone:d?new Date().toISOString():t.lastDone};}));}
  function createFolder(){
    if(!newFolderName.trim())return;
    const id=Date.now().toString();
    setLists(ls=>[...ls,{id,name:newFolderName.trim(),colorIdx:ls.length%6}]);
    setNewFolderName('');setAddingFolder(false);
  }
  function saveEditDeck(){
    if(!editDeckName.trim())return;
    setLists(ls=>ls.map(l=>l.id===editDeck.id?{...l,name:editDeckName.trim(),colorIdx:editDeckColorIdx}:l));
    setEditDeck(null);
  }
  function delFolder(id){
    if(!window.confirm('Удалить колоду и все задачи?'))return;
    setLists(ls=>ls.filter(l=>l.id!==id));
    setTasks(ts=>ts.filter(t=>t.listId!==id));
    if(openFolderId===id)setOpenFolderId(null);
  }

  return <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    {edit&&<EditTaskSheet task={edit} onSave={(t,n,r,c)=>saveEdit(edit.id,t,n,r,c)} onDelete={()=>del(edit.id)} onToHabit={()=>{convertToHabit(edit.id);setEdit(null);}} onClose={()=>setEdit(null)}/>}
    {/* Header */}
    <div style={{flexShrink:0,padding:ui.isPhone?'20px 0 14px':'18px 0 12px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
      <div style={{display:'flex',alignItems:'center',gap:8,minWidth:0,flex:1}}>
        {openFolderId&&<button onClick={()=>setOpenFolderId(null)} style={{width:36,height:36,borderRadius:11,border:'0.5px solid '+T.sep,background:T.ctrl,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,backdropFilter:BL,WebkitBackdropFilter:BL}}>
          <IcChevL c={T.ctrlTxt} s={18} sw={2}/>
        </button>}
        <div style={{minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {openFolder&&<FolderIcon color={P[openFolder.colorIdx||0].dot} size={22}/>}
            <span style={{fontSize:ui.isPhone?30:26,fontWeight:700,letterSpacing:-.5,color:T.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{openFolder?openFolder.name:'Дела'}</span>
          </div>
          <div style={{fontSize:ui.isPhone?14:13,color:T.muted,fontWeight:500,marginTop:2}}>{undone.length} осталось{openFolder?' В· колода':done.length>0?' В· '+done.length+' скрыто':''}</div>
        </div>
      </div>
      <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
        {!listView&&undone.length>1&&<GlassBtn onClick={shuffle}><IcShuffle c={T.ctrlTxt} s={15}/></GlassBtn>}
        {activeTasks.length>0&&<GlassBtn onClick={()=>{if(window.confirm('Удалить все?'))setTasks(ts=>ts.filter(t=>openFolderId?t.listId!==openFolderId:!!t.listId));}}><IcTrash c="#ff453a" s={15}/></GlassBtn>}
        <Pill onClick={()=>setListView(v=>!v)} active={listView}>
          {listView?<IcStack c={T.pillTxt} s={14}/>:<IcList c={T.ctrlTxt} s={14}/>}
          {listView?'Стопка':'Список'}
        </Pill>
        <button onClick={onToggleDark} style={{width:ui.isPhone?40:34,height:ui.isPhone?40:34,borderRadius:ui.isPhone?12:10,border:'0.5px solid '+T.sep,background:T.ctrl,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:BL,WebkitBackdropFilter:BL,flexShrink:0}}>
          {dark?<IcSun c={T.ctrlTxt} s={ui.isPhone?18:16} sw={1.8}/>:<IcMoon c={T.ctrlTxt} s={ui.isPhone?18:16} sw={1.8}/>}
        </button>
        <PlusBtn onClick={()=>setAdding(v=>!v)} active={adding}/>
      </div>
    </div>

    {/* Add form */}
    {adding&&<div style={{flexShrink:0,background:T.glass,backdropFilter:BL,WebkitBackdropFilter:BL,borderRadius:20,padding:18,marginBottom:14,border:'0.5px solid '+T.sep,animation:'scaleIn .2s ease'}}>
      <input value={addText} onChange={e=>setAddText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()} placeholder="Что нужно сделать?" style={{width:'100%',border:'none',outline:'none',fontSize:17,background:'transparent',marginBottom:14,color:T.text}}/>
      <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:14}}>{RECURS.map(r=><GlassBtn key={r.v} onClick={()=>setRecur(r.v)} style={recur===r.v?{background:T.pill,color:T.pillTxt}:{}}>{r.l}</GlassBtn>)}</div>
      <button onClick={add} style={{width:'100%',padding:12,borderRadius:13,border:'none',background:T.pill,color:T.pillTxt,fontSize:15,fontWeight:600,cursor:'pointer'}}>Добавить</button>
    </div>}


    {/* Stack view */}
    {!listView&&<div style={{flex:1,position:'relative',overflow:'hidden'}}>
      {activeTasks.length===0
        ?<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',color:T.muted}}>
            <IcSun c={T.muted} s={48}/>
            <div style={{fontSize:16,fontWeight:500,marginTop:12}}>{openFolder?'Колода пуста':'Нет задач - нажми +'}</div>
          </div>
        :undone.length===0
        ?<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:10}}>
            <div style={{fontSize:13,color:T.muted,fontWeight:500}}>Стол пуст</div>
            {done.length>0&&<GlassBtn onClick={()=>setTasks(ts=>ts.map(t=>activeTasks.find(a=>a.id===t.id)?{...t,done:false}:t))} style={{marginTop:6}}>↺ Вернуть {done.length}</GlassBtn>}

/* ===== SORTABLE LIST вЂ” proper iOS-style drag reorder ===== */
function SortableList({items,keyFn,renderItem,onReorder,gap=16}){
  const[src,setSrc]=useState(null);
  const[tgt,setTgt]=useState(null);
  const srcRef=useRef(null);
  const tgtRef=useRef(null);
  const refs=useRef([]);
  const meas=useRef({tops:[],heights:[]});
  const startYRef=useRef(0);
  const dyRef=useRef(0);
  const timer=useRef(null);
  const activeRef=useRef(false);

  function measure(){
    const tops=[],heights=[];
    refs.current.forEach(el=>{
      if(el){const r=el.getBoundingClientRect();tops.push(r.top);heights.push(r.height);}
      else{tops.push(0);heights.push(0);}
    });
    meas.current={tops,heights};
  }

  function applyDragTransform(d){
    // Move dragged element directly via DOM вЂ” no React re-render
    const el=refs.current[srcRef.current];
    if(el)el.style.transform='translateY('+d+'px) scale(1.04)';
  }

  function applyShifts(newTgt){
    const{heights}=meas.current;
    const s=srcRef.current;
    if(s===null)return;
    const h=(heights[s]||80)+gap;
    refs.current.forEach((el,i)=>{
      if(!el||i===s)return;
      let shift=0;
      if(s<newTgt&&i>s&&i<=newTgt)shift=-h;
      else if(s>newTgt&&i>=newTgt&&i<s)shift=h;
      el.style.transform=shift?'translateY('+shift+'px)':'none';
    });
  }

  function onTs(idx,e){
    e.target.style.webkitUserSelect='none';
    const y=e.touches[0].clientY;
    timer.current=setTimeout(()=>{
      measure();
      activeRef.current=true;
      srcRef.current=idx;tgtRef.current=idx;
      startYRef.current=y;dyRef.current=0;
      // Reset all transforms first
      refs.current.forEach((el,i)=>{if(el)el.style.transition=i===idx?'box-shadow .15s':'transform .22s cubic-bezier(.2,.8,.4,1)';});
      const dragEl=refs.current[idx];
      if(dragEl){dragEl.style.transform='translateY(0) scale(1.04)';dragEl.style.boxShadow='0 28px 64px rgba(0,0,0,.32)';dragEl.style.zIndex='100';}
      setSrc(idx);setTgt(idx);
      if(navigator.vibrate)navigator.vibrate(40);
    },480);
  }

  function onTm(e){
    clearTimeout(timer.current);
    if(!activeRef.current||srcRef.current===null)return;
    e.preventDefault();e.stopPropagation();
    const y=e.touches[0].clientY;
    const d=y-startYRef.current;
    dyRef.current=d;
    applyDragTransform(d);
    const{tops,heights}=meas.current;
    const s=srcRef.current;
    const srcCenter=tops[s]+heights[s]/2+d;
    let newTgt=s;
    for(let i=0;i<items.length;i++){
      if(i===s)continue;
      const mid=tops[i]+heights[i]/2;
      if(i<s&&srcCenter<mid){newTgt=i;break;}
      if(i>s&&srcCenter>mid)newTgt=i;
    }
    if(newTgt!==tgtRef.current){tgtRef.current=newTgt;setTgt(newTgt);applyShifts(newTgt);}
  }

  function onTe(e){
    clearTimeout(timer.current);
    const s=srcRef.current,t=tgtRef.current;
    if(activeRef.current&&s!==null&&t!==null&&t!==s)onReorder(s,t);
    activeRef.current=false;
    // Reset all DOM transforms
    refs.current.forEach(el=>{if(el){el.style.transform='';el.style.boxShadow='';el.style.zIndex='';}});
    srcRef.current=null;tgtRef.current=null;
    setSrc(null);setTgt(null);
  }

  return <div style={{position:'relative'}}>
    {items.map((item,idx)=>{
      const isDrag=idx===src;
      return <div
        key={keyFn(item,idx)}
        ref={el=>refs.current[idx]=el}
        onTouchStart={e=>onTs(idx,e)}
        onTouchMove={onTm}
        onTouchEnd={onTe}
        onContextMenu={e=>e.preventDefault()}
        style={{marginBottom:gap,touchAction:'pan-y',position:'relative',borderRadius:28,
          willChange:'transform',
        }}
      >{renderItem(item,idx,isDrag)}</div>;
    })}
  </div>;
}

function SwipeableCard({children,onSwipeRight,onSwipeLeft,onSwipeUp,style={}}){
  const stX=useRef(null),stY=useRef(null);
  const txR=useRef(0),tyR=useRef(0);
  const moving=useRef(false),dirL=useRef(null);
  const[tx,setTx]=useState(0);
  const[ty,setTy]=useState(0);

  function onTS(e){
    if(e.touches.length>1)return;
    stX.current=e.touches[0].clientX;
    stY.current=e.touches[0].clientY;
    txR.current=0;tyR.current=0;moving.current=false;dirL.current=null;
    setTx(0);setTy(0);
  }
  function onTM(e){
    if(stX.current===null)return;
    const dx=e.touches[0].clientX-stX.current;
    const dy=e.touches[0].clientY-stY.current;
    if(!moving.current){
      if(Math.abs(dx)>5||Math.abs(dy)>5){
        moving.current=true;
        dirL.current=Math.abs(dy)>Math.abs(dx)?'v':'h';
      } else return;
    }
    if(dirL.current==='v'){
      tyR.current=dy;txR.current=0;
      setTy(dy);setTx(0);
    } else {
      txR.current=dx;tyR.current=0;
      setTx(dx);setTy(0);
      e.stopPropagation(); // prevent scroll
    }
  }
  function onTE(){
    const cx=txR.current,cy=tyR.current;
    stX.current=null;stY.current=null;
    txR.current=0;tyR.current=0;
    moving.current=false;dirL.current=null;
    setTx(0);setTy(0);
    if(cy<-70&&Math.abs(cx)<60&&onSwipeUp){onSwipeUp();return;}
    if(cx>80&&onSwipeRight){onSwipeRight();return;}
    if(cx<-80&&onSwipeLeft){onSwipeLeft();return;}
  }

  const showH=Math.abs(tx)>30;
  const showUp=ty<-30&&Math.abs(tx)<50;

  return <div
    onTouchStart={onTS}
    onTouchMove={onTM}
    onTouchEnd={onTE}
    style={{position:'relative',overflow:'hidden',borderRadius:28,...style}}>
    {showUp&&<div style={{position:'absolute',inset:0,background:'rgba(120,120,128,.14)',display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:14,borderRadius:28,pointerEvents:'none',opacity:Math.min((-ty-30)/60,1)}}>
      <div style={{background:'rgba(60,60,70,.92)',borderRadius:50,padding:'7px 16px',display:'flex',alignItems:'center',gap:6}}>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        <span style={{color:'#fff',fontSize:12,fontWeight:700}}>Пропустить</span>
      </div>
    </div>}
    {showH&&tx>0&&<div style={{position:'absolute',inset:0,background:'rgba(48,209,88,.14)',display:'flex',alignItems:'center',paddingLeft:20,borderRadius:28,pointerEvents:'none',opacity:Math.min((tx-30)/60,1)}}>
      <div style={{background:'#30d158',borderRadius:50,padding:'7px 14px',display:'flex',alignItems:'center',gap:5}}><IcCheck c="#fff" s={13} sw={2.5}/><span style={{color:'#fff',fontSize:12,fontWeight:700}}>Сделано</span></div>
    </div>}
    {showH&&tx<0&&<div style={{position:'absolute',inset:0,background:'rgba(120,120,128,.12)',display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:20,borderRadius:28,pointerEvents:'none',opacity:Math.min((-tx-30)/60,1)}}>
      <div style={{background:'rgba(90,90,100,.9)',borderRadius:50,padding:'7px 14px',display:'flex',alignItems:'center',gap:5}}><IcX c="#fff" s={13} sw={2.5}/><span style={{color:'#fff',fontSize:12,fontWeight:700}}>Не выполнено</span></div>
    </div>}
    <div style={{transform:'translateX('+tx+'px) translateY('+(ty<0?ty*0.5:0)+'px)',transition:(tx===0&&ty===0)?'transform .28s cubic-bezier(.25,.46,.45,.94)':'none',willChange:'transform'}}>
      {children}
    </div>
  </div>;
}

function HabitCardsList({habits,setHabits,tday,d30,toggleDay,setDayState,setDayValue,streak,setEditH}){

    <SortableList items={habits} keyFn={h=>h.id} onReorder={reorder} renderItem={(h,idx,isDrag)=>{

                <circle cx="3" cy="2" r="1.5"/><circle cx="3" cy="8" r="1.5"/><circle cx="3" cy="14" r="1.5"/>

/* ===== TAB 2: HABITS ===== */
function HabitsTab({habits,setHabits,dark,onToggleDark}){
  const{T,ui}=useT();
  const P=dark?PD:PL;
  const pof=n=>P[Math.min(Math.max(n||0,0),P.length-1)];
  const d90=mkDates(90);
  const d30=mkDates(30);
  const tday=tod();
  const[adding,setAdding]=useState(false);
  const[addText,setAddText]=useState('');
  const[mode,setMode]=useState('stack');
  const[calH,setCalH]=useState(null);
  const[editH,setEditH]=useState(null);

  function add(){if(!addText.trim())return;setHabits(hs=>[ensDays({id:Date.now(),text:addText.trim(),notes:'',colorIdx:hs.length%6,days:[],totalReps:0},d90),...hs]);setAddText('');setAdding(false);}
  function setDayState(hid,date,state){
    setHabits(hs=>hs.map(h=>{
      if(h.id!==hid)return h;
      const cur=h.days.find(d=>d.date===date)?.state||null;
      const newState=state==='toggle'?(cur==='done'?null:'done'):state;
      const delta=(newState==='done'?1:0)-(cur==='done'?1:0);
      const newDays=h.days.find(d=>d.date===date)
        ?h.days.map(d=>d.date===date?{...d,state:newState}:d)
        :[...h.days,{date,state:newState}];
      return{...h,totalReps:(h.totalReps||0)+delta,days:newDays};
    }));
  }
  function toggleDay(hid,date){setDayState(hid,date,'toggle');}
  function setDayValue(hid,date,value){
    setHabits(hs=>hs.map(h=>{
      if(h.id!==hid)return h;
      const autoComplete=h.widget?.autoComplete!==false;
      const hasValue=Number(value)>0;
      const prev=h.days.find(d=>d.date===date);
      const prevState=prev?.state||null;
      const nextState=autoComplete?(hasValue?'done':(prevState==='done'?null:prevState)):prevState;
      const delta=(nextState==='done'?1:0)-(prevState==='done'?1:0);
      const newDays=h.days.find(d=>d.date===date)
        ?h.days.map(d=>d.date===date?{...d,state:nextState,value}:d)
        :[...h.days,{date,state:nextState,value}];
      return{...h,totalReps:(h.totalReps||0)+delta,days:newDays};
    }));
  }
  function del(id){setHabits(hs=>hs.filter(h=>h.id!==id));setEditH(null);}
  function move(idx,dir){setHabits(hs=>{const a=[...hs];const t=idx+dir;if(t<0||t>=a.length)return a;[a[idx],a[t]]=[a[t],a[idx]];return a;});}
  function saveH(id,text,notes,ci,widget){setHabits(hs=>hs.map(h=>h.id===id?{...h,text,notes,colorIdx:ci,widget:widget||null}:h));setEditH(null);}
  function streak(h){let s=0;for(let i=d30.length-2;i>=0;i--){const dd=h.days?.find(x=>x.date===d30[i]);if(dd?.state==='done')s++;else break;}return s;}

  const undT=habits.filter(h=>{
    const st=h.days?.find(d=>d.date===tday)?.state||null;
    return st!=='done'&&st!=='failed';
  });
  const donT=habits.filter(h=> h.days?.find(d=>d.date===tday)?.state==='done');

  function swR(h){setDayState(h.id,tday,'done');} // stack right = toggle done
  function swL(h){
    // Mark as failed AND remove from undone stack in one atomic update
    setHabits(hs=>hs.map(hh=>{
      if(hh.id!==h.id)return hh;
      const cur=hh.days.find(d=>d.date===tday)?.state||null;
      const delta=(0)-(cur==='done'?1:0);
      const newDays=hh.days.find(d=>d.date===tday)
        ?hh.days.map(d=>d.date===tday?{...d,state:'failed'}:d)
        :[...hh.days,{date:tday,state:'failed'}];
      return{...hh,totalReps:(hh.totalReps||0)+delta,days:newDays};
    }));
    // Do NOT move to end вЂ” card will naturally disappear from undT since state='failed'
  }
  function swU(h){setHabits(hs=>{const rest=hs.filter(x=>x.id!==h.id);return[...rest,h];});} // stack up = skip

  return <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    {calH&&<CalModal habit={calH} onClose={()=>setCalH(null)} onToggle={toggleDay}/>}
    {editH&&<EditHabitSheet habit={editH} showCal={!!editH._showCal} onSave={(t,n,c,w)=>saveH(editH.id,t,n,c,w)} onDelete={()=>del(editH.id)} onCalendar={()=>{setCalH(editH);setEditH(null);}} onClose={()=>setEditH(null)}/>}
    {/* Header */}
    <div style={{flexShrink:0,padding:ui.isPhone?'20px 0 14px':'18px 0 12px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div>
        <div style={{fontSize:ui.isPhone?30:26,fontWeight:700,letterSpacing:-.5,color:T.text}}>Привычки</div>
        <div style={{fontSize:ui.isPhone?14:13,color:T.muted,fontWeight:500,marginTop:2}}>{donT.length}/{habits.length} сегодня</div>
      </div>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        <Pill onClick={()=>setMode(m=>m==='stack'?'cards':'stack')} active={mode==='cards'}>
          {mode==='stack'?<IcList c={T.ctrlTxt} s={14}/>:<IcStack c={T.pillTxt} s={14}/>}
          {mode==='stack'?'Список':'Стопка'}
        </Pill>
        <button onClick={onToggleDark} style={{width:ui.isPhone?40:34,height:ui.isPhone?40:34,borderRadius:ui.isPhone?12:10,border:'0.5px solid '+T.sep,background:T.ctrl,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:BL,WebkitBackdropFilter:BL,flexShrink:0}}>
          {dark?<IcSun c={T.ctrlTxt} s={ui.isPhone?18:16} sw={1.8}/>:<IcMoon c={T.ctrlTxt} s={ui.isPhone?18:16} sw={1.8}/>}
        </button>
        <PlusBtn onClick={()=>setAdding(v=>!v)} active={adding}/>
      </div>
    </div>
    {adding&&<div style={{flexShrink:0,background:T.glass,backdropFilter:BL,WebkitBackdropFilter:BL,borderRadius:20,padding:18,marginBottom:14,border:'0.5px solid '+T.sep,animation:'scaleIn .2s ease'}}>
      <input autoFocus value={addText} onChange={e=>setAddText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()} placeholder="Название привычки..." style={{width:'100%',border:'none',outline:'none',fontSize:17,background:'transparent',marginBottom:14,color:T.text}}/>
      <button onClick={add} style={{width:'100%',padding:12,borderRadius:13,border:'none',background:T.pill,color:T.pillTxt,fontSize:15,fontWeight:600,cursor:'pointer'}}>Добавить</button>
    </div>}
    {/* Stack */}
    {mode==='stack'&&<div style={{flex:1,position:'relative',overflow:'hidden'}}>
      {habits.length===0
        ?<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',color:T.muted}}><IcLeaf c={T.muted} s={48}/><div style={{fontSize:16,fontWeight:500,marginTop:12}}>Нет привычек</div></div>
        :undT.length===0
        ?<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:10}}><IcCheck c={T.muted} s={48}/><div style={{fontSize:18,fontWeight:700,color:T.text}}>Всё отмечено!</div><div style={{fontSize:13,color:T.muted}}>{donT.length} ✓  {habits.filter(h=>h.days?.find(d=>d.date===tday)?.state==='failed').length} ✗</div></div>
        :<>
          <div style={{position:'absolute',top:0,left:0,right:0,zIndex:10,display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0 8px',pointerEvents:'none'}}>
            <span style={{fontSize:12,fontWeight:600,color:T.muted}}>← Позже</span>
            <span style={{fontSize:12,fontWeight:600,color:T.muted}}>Готово →</span>
          </div>
          <div style={{position:'absolute',top:22,left:0,right:0,bottom:0}}>
            <TinderStack items={undT} onRight={swR} onLeft={swL} onUp={swU} onTap={h=>setEditH({...h,_showCal:true})}  renderCard={(h)=>{
              const p=pof(h.colorIdx);const str=streak(h);
              return <div style={{padding:'24px 24px',height:'100%',display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
                <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>
                  {str>0&&<div style={{fontSize:12,color:p.sub,fontWeight:600,marginBottom:6,display:'flex',alignItems:'center',gap:5}}><IcFlame c={p.sub} s={12}/>{str} дней подряд</div>}
                  <div style={{fontSize:h.widget?22:28,fontWeight:700,color:p.text,lineHeight:1.3,letterSpacing:-.4,marginBottom:h.notes?8:h.widget?14:0}}>{h.text}</div>
                  {h.notes&&<div style={{fontSize:13,color:p.sub,lineHeight:1.5,marginBottom:h.widget?12:0}}>{h.notes}</div>}
                  {h.widget?.type==='counter'&&<div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <CounterWidget habit={h} date={tday} p={p} onValue={setDayValue}/>
                  </div>}
                  {h.widget?.type==='pomodoro'&&<div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <PomodoroWidget habit={h} date={tday} p={p} onDone={()=>setDayState(h.id,tday,'done')}/>
                  </div>}
                  {h.widget?.type==='mood'&&<div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <MoodWidget habit={h} date={tday} p={p} onValue={setDayValue}/>
                  </div>}
                </div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0,marginTop:12}}>
                  <div style={{display:'flex',gap:5}}>{undT.slice(0,7).map((_,i)=><div key={i} style={{width:i===0?20:7,height:6,borderRadius:3,background:i===0?p.dot:(p.dot+'40')}}/>)}</div>
                  <div style={{fontSize:11,color:p.sub,opacity:.45,display:'flex',alignItems:'center',gap:3}}><IcPencil c={p.sub} s={11}/>изменить</div>
                </div>
              </div>;
            }}/>
          </div>
          {donT.length>0&&<div style={{position:'absolute',bottom:8,right:8,background:T.glass,backdropFilter:BL,WebkitBackdropFilter:BL,borderRadius:12,padding:'5px 11px',border:'0.5px solid '+T.sep}}><span style={{fontSize:12,fontWeight:600,color:T.sub}}>✓ {donT.length}</span></div>}
        </>}
    </div>}
    {/* Cards mode вЂ” long press to drag reorder */}
    {mode==='cards'&&<HabitCardsList habits={habits} setHabits={setHabits} tday={tday} d30={d30} toggleDay={toggleDay} setDayState={setDayState} setDayValue={setDayValue} streak={streak} setEditH={setEditH}/>}
  </div>;
}

/* ===== TAB 3: SR ===== */
function SRTab({dark,onToggleDark}){
  const{T,ui}=useT();
  const P=dark?PD:PL;
  const pof=n=>P[Math.min(Math.max(n||0,0),P.length-1)];
  const[cards,setCards]=useState(()=>ld('sr9',[]));
  const[front,setFront]=useState('');
  const[back,setBack]=useState('');
  const[flipped,setFlipped]=useState(false);
  const[fly,setFly]=useState(null);
  const[dx,setDx]=useState(0);
  const[dy,setDy]=useState(0);
  const stRef=useRef(null);
  const dxRef=useRef(0);
  const dyRef=useRef(0);
  const[adding,setAdding]=useState(false);
  useEffect(()=>{sv('sr9',cards);},[cards]);
  const now=Date.now();
  const due=cards.filter(c=>c.nextReview<=now).sort((a,b)=>a.nextReview-b.nextReview);
  const cur=due[0],sec=due[1],thr=due[2];
  const cp=cur?pof(cur.reps):P[0];

  function addCard(){if(!front.trim()||!back.trim())return;setCards(cs=>[...cs,{id:Date.now(),front:front.trim(),back:back.trim(),level:0,nextReview:Date.now(),reps:0}]);setFront('');setBack('');setAdding(false);}
  function answer(knew){
    if(!cur||fly)return;
    setFly(knew?'right':'left');setDx(0);setDy(0);dxRef.current=0;dyRef.current=0;
    setTimeout(()=>{
      setCards(cs=>cs.map(c=>{if(c.id!==cur.id)return c;const nl=knew?Math.min(c.level+1,SR.length-1):0;return{...c,level:nl,nextReview:Date.now()+SR[nl].ms,reps:(c.reps||0)+(knew?1:0)};}));
      setFly(null);setFlipped(false);setDx(0);setDy(0);
    },360);
  }
  function dn(e){if(fly)return;const x=e.clientX??e.touches?.[0]?.clientX;const y=e.clientY??e.touches?.[0]?.clientY;stRef.current={x,y};dxRef.current=0;dyRef.current=0;setDx(0);setDy(0);}
  function mv(e){if(!stRef.current||fly)return;const nx=(e.clientX??e.touches?.[0]?.clientX)-stRef.current.x;const ny=(e.clientY??e.touches?.[0]?.clientY)-stRef.current.y;dxRef.current=nx;dyRef.current=ny;setDx(nx);setDy(ny);}
  function up(){if(!stRef.current)return;const cx=dxRef.current,cy=dyRef.current;stRef.current=null;if(cx>90)answer(true);else if(cx<-90)answer(false);else if(Math.abs(cx)<12&&Math.abs(cy)<12)setFlipped(f=>!f);if(Math.abs(cx)<=90){dxRef.current=0;dyRef.current=0;setDx(0);setDy(0);}}
  const drag=!!stRef.current&&!fly;

  return <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    <div style={{flexShrink:0,padding:ui.isPhone?'20px 0 14px':'18px 0 12px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div>
        <div style={{fontSize:ui.isPhone?30:26,fontWeight:700,letterSpacing:-.5,color:T.text}}>Повторение</div>
        <div style={{fontSize:ui.isPhone?14:13,color:T.muted,fontWeight:500,marginTop:2}}>{due.length} к повторению · {cards.length} всего</div>
      </div>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        <button onClick={onToggleDark} style={{width:ui.isPhone?40:34,height:ui.isPhone?40:34,borderRadius:ui.isPhone?12:10,border:'0.5px solid '+T.sep,background:T.ctrl,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:BL,WebkitBackdropFilter:BL,flexShrink:0}}>
          {dark?<IcSun c={T.ctrlTxt} s={ui.isPhone?18:16} sw={1.8}/>:<IcMoon c={T.ctrlTxt} s={ui.isPhone?18:16} sw={1.8}/>}
        </button>
        <PlusBtn onClick={()=>setAdding(v=>!v)} active={adding}/>
      </div>
    </div>
    {adding&&<div style={{flexShrink:0,background:T.glass,backdropFilter:BL,WebkitBackdropFilter:BL,borderRadius:20,padding:18,marginBottom:14,border:'0.5px solid '+T.sep,animation:'scaleIn .2s ease'}}>
      <input autoFocus value={front} onChange={e=>setFront(e.target.value)} placeholder="Вопрос..." style={{width:'100%',border:'none',borderBottom:'0.5px solid '+T.sep,outline:'none',fontSize:16,background:'transparent',paddingBottom:11,marginBottom:12,color:T.text}}/>
      <input value={back} onChange={e=>setBack(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCard()} placeholder="Ответ..." style={{width:'100%',border:'none',outline:'none',fontSize:16,background:'transparent',marginBottom:14,color:T.text}}/>
      <button onClick={addCard} style={{width:'100%',padding:12,borderRadius:13,border:'none',background:T.pill,color:T.pillTxt,fontSize:15,fontWeight:600,cursor:'pointer'}}>Добавить</button>
    </div>}
    {cur?<div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{flexShrink:0,display:'flex',justifyContent:'space-between',padding:'0 8px',marginBottom:12}}>
        <span style={{fontSize:12,fontWeight:600,color:dx<-40?'#ff3b30':T.muted,transition:'color .1s'}}>← Не знаю</span>
        <span style={{fontSize:12,fontWeight:600,color:dx>40?'#30d158':T.muted,transition:'color .1s'}}>Знаю →</span>
      </div>
      <div style={{flex:1,position:'relative'}}>
        {thr&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}><div style={{width:'calc(100% - 44px)',height:'100%',borderRadius:28,background:pof(thr.reps).bg,transform:'scale(.88) translateY('+(drag?-12:0)+'px)',transition:drag?'none':'transform .3s ease'}}/></div>}
        {sec&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}><div style={{width:'calc(100% - 22px)',height:'100%',borderRadius:28,background:pof(sec.reps).bg,transform:'scale(.94) translateY('+(drag?-20:0)+'px)',transition:drag?'none':'transform .3s ease',boxShadow:'0 4px 24px rgba(0,0,0,.12)'}}/></div>}
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>

              transition:fly||!stRef.current?'transform .36s cubic-bezier(.25,.46,.45,.94),box-shadow .15s':'box-shadow .15s',
            }}>
            {dx>30&&<div style={{position:'absolute',inset:0,borderRadius:28,background:'rgba(48,209,88,.1)',display:'flex',alignItems:'flex-start',justifyContent:'flex-end',padding:20,pointerEvents:'none',opacity:Math.min((dx-30)/60,1)}}><div style={{background:'#30d158',borderRadius:50,padding:'7px 14px',display:'flex',alignItems:'center',gap:6}}><IcCheck c="#fff" s={14} sw={2.5}/><span style={{color:'#fff',fontSize:13,fontWeight:700}}>Знаю</span></div></div>}
            {dx<-30&&<div style={{position:'absolute',inset:0,borderRadius:28,background:'rgba(255,59,48,.08)',display:'flex',alignItems:'flex-start',justifyContent:'flex-start',padding:20,pointerEvents:'none',opacity:Math.min((-dx-30)/60,1)}}><div style={{background:'#ff3b30',borderRadius:50,padding:'7px 14px',display:'flex',alignItems:'center',gap:6}}><IcX c="#fff" s={14} sw={2.5}/><span style={{color:'#fff',fontSize:13,fontWeight:700}}>Не знаю</span></div></div>}
            <div style={{padding:'28px 24px',height:'100%',display:'flex',flexDirection:'column',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{width:'100%'}}>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:2.5,color:cp.sub,marginBottom:16,textTransform:'uppercase',textAlign:'center'}}>{flipped?'Ответ':'Вопрос'}</div>
                <div style={{fontSize:26,fontWeight:700,textAlign:'center',color:cp.text,lineHeight:1.4,letterSpacing:-.3}}>{flipped?cur.back:cur.front}</div>
              </div>
              <div style={{width:'100%'}}>
                <div style={{display:'flex',gap:5,justifyContent:'center',marginBottom:8}}>{SR.map((_,i)=><div key={i} style={{width:cur.level>=i?20:8,height:5,borderRadius:3,background:cur.level>=i?cp.dot:'rgba(128,128,128,.18)',transition:'all .3s'}}/>)}</div>
                <div style={{fontSize:12,color:cp.sub,textAlign:'center',fontWeight:500}}>{flipped?'свайп: вправо - знаю, влево - нет':'нажми чтобы перевернуть'}</div>

        {[{cb:()=>answer(false),c:'#ff3b30',bg:dark?'rgba(255,59,48,.12)':'rgba(255,59,48,.07)',Icon:IcX},{cb:()=>setFlipped(f=>!f),c:T.sub,bg:T.ctrl,Icon:IcRepeat},{cb:()=>answer(true),c:'#30d158',bg:dark?'rgba(48,209,88,.12)':'rgba(48,209,88,.07)',Icon:IcCheck}].map((b,i)=>
          <button key={i} onClick={b.cb} style={{width:58,height:58,borderRadius:'50%',border:'1px solid '+(b.c+'28'),background:b.bg,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',backdropFilter:BL,WebkitBackdropFilter:BL}}>

        )}
      </div>
    </div>
    :cards.length>0?<div style={{flex:1,overflowY:'auto'}}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',paddingTop:28,paddingBottom:16,gap:8}}>
        <IcRepeat c={T.muted} s={44}/>
        <div style={{fontSize:18,fontWeight:700,letterSpacing:-.3,color:T.text}}>Всё повторено!</div>
        <div style={{color:T.muted,fontSize:14,fontWeight:500}}>Следующее: {fmtMs(Math.min(...cards.map(c=>c.nextReview))-now)}</div>
      </div>
      <div style={{background:T.glass,backdropFilter:BL,WebkitBackdropFilter:BL,borderRadius:18,overflow:'hidden',border:'0.5px solid '+T.sep}}>
        {cards.map((c,i)=>{const p2=pof(c.reps);return <div key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'11px 14px',borderBottom:i<cards.length-1?'0.5px solid '+T.sep:'none'}}>
          <div style={{width:8,height:8,borderRadius:'50%',background:p2.dot,flexShrink:0}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,color:T.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.front}</div>
            <div style={{fontSize:12,color:T.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.back}</div>
          </div>
          <div style={{fontSize:11,fontWeight:600,color:T.muted,textAlign:'right',flexShrink:0}}>
            <div>{fmtMs(c.nextReview-now)}</div>
            <div>Ур.{c.level+1}</div>
          </div>
          <button onClick={()=>setCards(cs=>cs.filter(x=>x.id!==c.id))} style={{background:'none',border:'none',cursor:'pointer',display:'flex',opacity:.4}}><IcX c={T.muted} s={15}/></button>
        </div>;})}
      </div>
    </div>
    :<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:T.muted,gap:12}}>
      <IcBrain c={T.muted} s={44}/>
      <div style={{fontSize:16,fontWeight:500}}>Нажми + чтобы добавить</div>
    </div>}
  </div>;
}
