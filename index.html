const IcUser = Ic('<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>');

function AuthSheet({ onClose, onAuth }) {
  const { T, ui } = useT();
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [pass2, setPass2] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const ia = IaStyle(T, ui);
  const ERR = {
    'auth/email-already-in-use': 'Email уже используется',
    'auth/user-not-found': 'Пользователь не найден',
    'auth/wrong-password': 'Неверный пароль',
    'auth/invalid-email': 'Неверный email',
    'auth/weak-password': 'Минимум 6 символов',
    'auth/invalid-credential': 'Неверный email или пароль',
    'auth/too-many-requests': 'Слишком много попыток, подождите'
  };
  async function submit() {
    if (!email.trim() || !pass) { setErr('Заполните все поля'); return; }
    if (mode === 'register' && pass !== pass2) { setErr('Пароли не совпадают'); return; }
    if (pass.length < 8) { setErr('Пароль: минимум 8 символов'); return; }
    setBusy(true); setErr('');
    _authingNow = true;
    try {
      if (mode === 'register') await _auth.createUserWithEmailAndPassword(email.trim(), pass);
      else await _auth.signInWithEmailAndPassword(email.trim(), pass);
      await onAuth(pass);
      onClose();
    } catch(e) {
      _authingNow = false;
      // Если Firebase auth успешен но onAuth упал — выходим
      if (_auth?.currentUser) { try { await _auth.signOut(); } catch(_) {} }
      setErr(ERR[e.code] || e.message || 'Ошибка');
    } finally { setBusy(false); }
  }
  return <Sheet onClose={onClose}>
    <SectionLabel>Аккаунт</SectionLabel>
    <div style={{ display: 'flex', gap: 6, marginBottom: 18 }}>
      <GlassBtn onClick={() => { setMode('login'); setErr(''); }} style={mode === 'login' ? { background: T.pill, color: T.pillTxt } : {}}>Войти</GlassBtn>
      <GlassBtn onClick={() => { setMode('register'); setErr(''); }} style={mode === 'register' ? { background: T.pill, color: T.pillTxt } : {}}>Регистрация</GlassBtn>
    </div>
    <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="Email" style={{ ...ia, marginBottom: 10, fontSize: 16 }} autoComplete="email" />
    <input type="password" value={pass} onChange={e => setPass(e.target.value)} onKeyDown={e => mode === 'login' && e.key === 'Enter' && submit()} placeholder="Пароль (мин. 8 символов)" style={{ ...ia, marginBottom: 10, fontSize: 16 }} autoComplete={mode === 'register' ? 'new-password' : 'current-password'} />
    {mode === 'register' && <input type="password" value={pass2} onChange={e => setPass2(e.target.value)} onKeyDown={e => e.key === 'Enter' && submit()} placeholder="Повторите пароль" style={{ ...ia, marginBottom: 10, fontSize: 16 }} autoComplete="new-password" />}
    {err && <div style={{ color: '#ff453a', fontSize: 13, marginBottom: 10, padding: '8px 12px', background: 'rgba(255,69,58,.08)', borderRadius: 10 }}>{err}</div>}
    <button onClick={submit} disabled={busy} style={{ width: '100%', padding: 13, borderRadius: 14, border: 'none', background: busy ? T.ctrl : T.pill, color: busy ? T.ctrlTxt : T.pillTxt, fontSize: 16, fontWeight: 600, cursor: busy ? 'default' : 'pointer', marginBottom: 16 }}>
      {busy ? 'Загрузка...' : (mode === 'register' ? 'Создать аккаунт' : 'Войти')}
    </button>
    <div style={{ fontSize: 12, color: T.muted, lineHeight: 1.65, padding: '10px 12px', background: T.ctrl, borderRadius: 12 }}>
      🔒 Данные шифруются на вашем устройстве (AES-256-GCM) ключом, производным от вашего пароля (PBKDF2, 310 000 итераций). Сервер хранит только зашифрованный блок — без возможности прочитать содержимое. Забытый пароль = потеря доступа к данным.
    </div>
  </Sheet>;
}

function App(){
  const[tab,setTab]=useState(0);
  const[onboarding,setOnboarding]=useState(()=>!localStorage.getItem('onb2'));
  const[dark,setDark]=useState(()=>{const s=localStorage.getItem('dm');if(s!=null)return s==='1';return window.matchMedia('(prefers-color-scheme: dark)').matches;});
  const[vw,setVw]=useState(()=>window.innerWidth);
  const[tasks,setTasks]=useState(()=>ld('tk9',[]));
  const[lists,setLists]=useState(()=>ld('tl9',[]));
  const[habits,setHabits]=useState(()=>{const raw=ld('hb9',[]);const d90=mkDates(90);return raw.map(h=>ensDays(h,d90));});

  // Auth & Sync state
  const[authUser,setAuthUser]=useState(null);
  const[showAuth,setShowAuth]=useState(false);
  const[showAccount,setShowAccount]=useState(false);
  const[needsReenter,setNeedsReenter]=useState(false);
  const[syncStatus,setSyncStatus]=useState('idle'); // 'idle'|'syncing'|'synced'|'error'
  const[lastSync,setLastSync]=useState(null);
  // Social state
  const[sharedHabits,setSharedHabits]=useState([]);
  const fromCloudRef=useRef(false); // true = не пушить обратно после получения с облака
  const syncRef=useRef(null);
  const syncActive=useRef(false); // true во время пуша (блокирует эхо в листенере)
  const saltRef=useRef(null);

  useEffect(()=>{sv('tk9',tasks);},[tasks]);
  useEffect(()=>{sv('tl9',lists);},[lists]);
  useEffect(()=>{sv('hb9',habits);},[habits]);
  useEffect(()=>{localStorage.setItem('dm',dark?'1':'0');document.body.style.background=dark?'#000':'#f2f2f7';},[dark]);
  useEffect(()=>{
    const onResize=()=>setVw(window.innerWidth);
    window.addEventListener('resize',onResize);
    return()=>window.removeEventListener('resize',onResize);
  },[]);

  // ===== Firebase auth observer =====
  useEffect(()=>{
    if(!FB_READY||!_auth)return;
    return _auth.onAuthStateChanged(async fbUser=>{
      if(fbUser){
        setAuthUser(fbUser);
        if(_authingNow)return; // свежий логин — onAuth() сам настроит ключ
        const k=await getKey();
        if(k){
          try{
            const d=await fsGet(fbUser.uid);
            if(d?.salt)saltRef.current=d.salt;
            if(d?.payload){const cloud=await decAll(k,d.payload);applyCloud(cloud);}
          }catch(e){console.warn('Cloud load:',e);}
        } else {
          setNeedsReenter(true);
        }
      } else {
        setAuthUser(null);setNeedsReenter(false);
      }
    });
  },[]);

  // ===== Дебаунс-синк (3 сек после последнего изменения) =====
  useEffect(()=>{
    if(fromCloudRef.current){fromCloudRef.current=false;return;}
    const cu=_auth?.currentUser;
    if(!cu||!saltRef.current)return;
    clearTimeout(syncRef.current);
    syncRef.current=setTimeout(async()=>{
      const k=await getKey();
      if(!k||!saltRef.current||!_auth?.currentUser)return;
      syncActive.current=true;
      setSyncStatus('syncing');
      try{
        await cloudPush(_auth.currentUser.uid,tasks,lists,habits,k,saltRef.current);
        setSyncStatus('synced');setLastSync(Date.now());
      }catch(e){
        setSyncStatus('error');console.warn('Sync error:',e);
      }finally{
        setTimeout(()=>{syncActive.current=false;},2000);
      }
    },3000);
    return()=>clearTimeout(syncRef.current);
  },[tasks,lists,habits]);

  // ===== Реалтайм-листенер Firestore =====
  useEffect(()=>{
    if(!authUser||!FB_READY)return;
    const unsub=_db.collection('u').doc(authUser.uid).onSnapshot(
      {includeMetadataChanges:true},
      async snap=>{
        // Игнорируем: незакоммиченные локальные правки, наши собственные пуши
        if(!snap.exists||snap.metadata.hasPendingWrites||syncActive.current)return;
        const k=await getKey();if(!k)return;
        try{
          const d=snap.data();
          if(!d?.payload)return;
          const cloud=await decAll(k,d.payload);
          applyCloud(cloud);
        }catch(e){}
      }
    );
    return unsub;
  },[authUser?.uid]);

  // ===== Listener for shared habits =====
  useEffect(()=>{
    if(!authUser||!_db)return;
    const unsub=_db.collection('sharedHabits')
      .where('participants','array-contains',authUser.uid)
      .onSnapshot(snap=>{
        setSharedHabits(snap.docs.map(d=>({...d.data(),id:d.id})).filter(sh=>sh.status==='active'));
      },e=>console.warn('sharedHabits listener:',e));
    return unsub;
  },[authUser?.uid]);

  // в”Ђв”Ђ Midnight reset в”Ђв”Ђ
  // Logic:
  //   вЂў Recurring tasks (daily/weekly/etc) в†’ reset done:false so they reappear
  //   вЂў Done non-recurring tasks в†’ removed (они ушли, день закончился)
  //   вЂў Undone tasks of any kind в†’ carry over as-is
  //   вЂў Habits в†’ ensureDays runs again with fresh 90-day window (today shifts forward)
  useEffect(()=>{
    function doReset(){
      const stored=ld('lastResetDate','');
      const today=tod();
      if(stored===today)return; // already reset today
      sv('lastResetDate',today);

      // Reset tasks вЂ” check each recurrence period individually
      setTasks(ts=>{
        const now=new Date();
        const todayDow=now.getDay();
        const todayStr=now.toDateString();
        return ts
          .map(t=>{
            const scheduledToday=hasSchedule(t)&&t.weekdays.includes(todayDow);
            if(t.recur==='none'&&!scheduledToday) return t;
            if(!t.done) return t;

            // Check if enough time has passed since it was last done
            const lastDone=t.lastDone?new Date(t.lastDone):null;
            if(!lastDone) return {...t,done:false,lastDone:null};
            if(scheduledToday&&lastDone.toDateString()!==todayStr)return {...t,done:false,lastDone:null};

            const daysDiff=Math.floor((now-lastDone)/(1000*60*60*24));
            let shouldReset=false;
            if(t.recur==='daily')   shouldReset=daysDiff>=1;
            if(t.recur==='weekly')  shouldReset=daysDiff>=7;
            if(t.recur==='monthly') shouldReset=now.getMonth()!==lastDone.getMonth()||now.getFullYear()!==lastDone.getFullYear();
            if(t.recur==='yearly')  shouldReset=now.getFullYear()!==lastDone.getFullYear();

            return shouldReset?{...t,done:false,lastDone:null}:t;
          })
          .filter(t=>!t.done||t.recur!=='none'||hasSchedule(t));
      });

      // Refresh habits window (shift the 30/90-day strip to include new today)
      setHabits(hs=>{
        const d90=mkDates(90);
        return hs.map(h=>ensDays(h,d90));
      });
    }

    doReset(); // check on mount / tab focus

    // Re-check when tab becomes visible (user opens app after midnight)
    function onVisible(){if(document.visibilityState==='visible')doReset();}
    document.addEventListener('visibilitychange',onVisible);

    // Schedule timer to fire exactly at next midnight
    function schedMidnight(){
      const now=new Date();
      const ms=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,0,0,0)-now;
      return setTimeout(()=>{doReset();schedMidnight();},ms+500); // +500ms buffer
    }
    const timer=schedMidnight();

    return ()=>{
      document.removeEventListener('visibilitychange',onVisible);
      clearTimeout(timer);
    };
  },[]);

  // Применяет данные из облака (merge: облако побеждает при конфликте по id)
  function applyCloud(cloud){
    const d90=mkDates(90);
    fromCloudRef.current=true;
    setTasks(cur=>mergeArr(cur,cloud.tasks||[]));
    setLists(cur=>mergeArr(cur,cloud.lists||[]));
    setHabits(cur=>mergeArr(cur,(cloud.habits||[]).map(h=>ensDays(h,d90))));
  }

  // Вызывается после успешного Firebase auth: деривирует ключ, синкает данные
  async function onAuth(pass){
    const user=_auth.currentUser;if(!user)return;
    try{
      await user.getIdToken(true);
      await ensureProfile(user.uid,user.email);
      const ex=await fsGet(user.uid);
      const salt=ex?.salt||xh(crypto.getRandomValues(new Uint8Array(16)));
      saltRef.current=salt;
      const k=await pbkdf2Key(pass,hx(salt));
      await storeKey(k);
      if(ex?.payload){
        // Есть данные в облаке — декриптуем и мержим
        const cloud=await decAll(k,ex.payload);
        applyCloud(cloud);
        // После оседания стейта в localStorage — пушим смерженный результат
        setTimeout(async()=>{
          const k2=await getKey();
          if(!k2||!saltRef.current||!_auth?.currentUser)return;
          const t=ld('tk9',[]),l=ld('tl9',[]),h=ld('hb9',[]);
          try{
            await cloudPush(_auth.currentUser.uid,t,l,h,k2,saltRef.current);
            setSyncStatus('synced');setLastSync(Date.now());
          }catch(e){setSyncStatus('error');}
        },800);
      } else {
        // Новый аккаунт — пушим локальные данные
        setSyncStatus('syncing');
        try{
          await cloudPush(user.uid,tasks,lists,habits,k,salt);
          setSyncStatus('synced');setLastSync(Date.now());
        }catch(e){setSyncStatus('error');}
      }
    }finally{_authingNow=false;}
  }

  // Повторный ввод пароля (после обновления страницы когда сессия есть но ключ утерян)
  async function onReenter(pass){
    const user=_auth?.currentUser;if(!user)throw new Error('Нет сессии');
    const ex=await fsGet(user.uid);
    if(!ex?.salt||!ex?.payload)throw new Error('Нет данных в облаке');
    const k=await pbkdf2Key(pass,hx(ex.salt));
    let cloud;
    try{cloud=await decAll(k,ex.payload);}catch(e){throw new Error('Неверный пароль');}
    await storeKey(k);
    saltRef.current=ex.salt;
    setNeedsReenter(false);
    applyCloud(cloud);
  }

  // Выход: очищаем ключ, данные в памяти и localStorage
  async function onLogout(){
    clearTimeout(syncRef.current);
    await _auth.signOut();
    clearKey();
    saltRef.current=null;
    setSyncStatus('idle');setLastSync(null);
    fromCloudRef.current=true; // блокируем пуш от очистки стейта
    setAuthUser(null);setNeedsReenter(false);
    setTasks([]);setLists([]);setHabits([]);
  }

  function go(id){
    if(id===tab)return;
    setTab(id);
  }
  function convertToHabit(id){
    const task=tasks.find(t=>t.id===id);if(!task)return;
    const d90=mkDates(90);
    setHabits(hs=>[ensDays({id:Date.now(),text:task.text,notes:task.notes||'',colorIdx:hs.length%6,weekdays:task.weekdays||[],days:[],totalReps:0},d90),...hs]);
    setTasks(ts=>ts.filter(t=>t.id!==id));
    go(1);
  }

  const T=dark?DT:LT;
  const ui={isPhone:vw<=520,sidePad:vw<=520?10:16};
  return <Cx.Provider value={{dark,T,ui}}>
    <div style={{height:'100dvh',display:'flex',flexDirection:'column',background:T.bg,overflow:'hidden',transition:'background .3s',color:T.text}}>
      {onboarding&&<Onboarding onDone={()=>{localStorage.setItem('onb2','1');setOnboarding(false);}}/>}
      {showAuth&&<AuthSheet onClose={()=>setShowAuth(false)} onAuth={onAuth}/>}
      {showAccount&&authUser&&<AccountSheet user={authUser} syncStatus={syncStatus} lastSync={lastSync} onLogout={onLogout} onClose={()=>setShowAccount(false)}/>}
      {needsReenter&&authUser&&<ReenterSheet email={authUser.email} onConfirm={onReenter} onLogout={onLogout} onClose={()=>setNeedsReenter(false)}/>}
      <div style={{flex:1,overflow:'hidden',maxWidth:ui.isPhone?'100%':600,width:'100%',margin:'0 auto',padding:'0 '+ui.sidePad+'px',position:'relative'}}>
        {/* All tabs always mounted вЂ” state preserved. Slide between them via CSS. */}
        {[0,1,2,3].map(tid=>{
          const active=tid===tab;
          const offset=active?0:(tid<tab?-100:100);
          return <div key={tid} style={{
            position:'absolute',inset:0,padding:'0 '+ui.sidePad+'px',
            display:'flex',flexDirection:'column',
            opacity:active?1:0,
            pointerEvents:active?'auto':'none',
            transform:'translateX('+offset+'%)',
            transition:'transform .34s cubic-bezier(.4,0,.2,1), opacity .28s cubic-bezier(.4,0,.2,1)',
          }}>
            {tid===0&&<DailyTab tasks={tasks} setTasks={setTasks} lists={lists} setLists={setLists} convertToHabit={convertToHabit} dark={dark} onToggleDark={()=>setDark(d=>!d)}/>}
            {tid===1&&<HabitsTab habits={habits} setHabits={setHabits} dark={dark} onToggleDark={()=>setDark(d=>!d)} sharedHabits={sharedHabits} myUid={authUser?.uid}/>}
            {tid===2&&<SRTab dark={dark} onToggleDark={()=>setDark(d=>!d)}/>}
            {tid===3&&<ChatTab authUser={authUser} tasks={tasks} habits={habits}
              onAddTask={t=>setTasks(ts=>[{...t,id:Date.now(),done:false},...ts])}/>}
          </div>;
        })}
      </div>
      {/* Tab bar */}
      <div style={{flexShrink:0,background:T.tb,backdropFilter:BL,WebkitBackdropFilter:BL,borderTop:'0.5px solid '+T.sep}}>
        <div style={{maxWidth:ui.isPhone?'100%':600,margin:'0 auto',display:'flex',alignItems:'stretch'}}>
          {TABS.map(t=>{
            const act=tab===t.id;
            return <button key={t.id} onClick={()=>go(t.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:ui.isPhone?3:2,padding:ui.isPhone?'10px 4px 14px':'8px 4px 10px',border:'none',cursor:'pointer',background:'transparent',color:act?T.ton:T.toff,transition:'color .18s',WebkitTapHighlightColor:'transparent'}}>
              <t.Icon c={act?T.ton:T.toff} s={ui.isPhone?23:20}/>
              <span style={{fontSize:ui.isPhone?10:9,fontWeight:act?700:400,transition:'font-weight .18s'}}>{t.l}</span>
            </button>;
          })}
          {FB_READY&&<button onClick={()=>authUser?setShowAccount(true):setShowAuth(true)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:ui.isPhone?3:2,padding:ui.isPhone?'10px 4px 14px':'8px 4px 10px',border:'none',cursor:'pointer',background:'transparent',WebkitTapHighlightColor:'transparent',position:'relative'}}>
            <div style={{width:ui.isPhone?23:20,height:ui.isPhone?23:20,borderRadius:'50%',background:authUser?'linear-gradient(135deg,#5856d6,#007aff)':T.ctrl,display:'flex',alignItems:'center',justifyContent:'center',border:authUser?'none':'0.5px solid '+T.sep}}>
              {authUser?<span style={{fontSize:ui.isPhone?11:9,fontWeight:700,color:'#fff'}}>{(authUser.email||'?')[0].toUpperCase()}</span>:<IcUser c={T.ctrlTxt} s={ui.isPhone?13:11} sw={1.8}/>}
            </div>
            <span style={{fontSize:ui.isPhone?10:9,fontWeight:400,color:T.toff}}>Аккаунт</span>
            {authUser&&syncStatus!=='idle'&&<div style={{position:'absolute',top:8,left:'50%',transform:'translateX(6px)',width:6,height:6,borderRadius:'50%',background:syncStatus==='syncing'?'#ff9500':syncStatus==='synced'?'#30d158':'#ff453a',border:'1.5px solid '+T.tb}}/>}
          </button>}
        </div>
      </div>
    </div>
  </Cx.Provider>;
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.log('SW error:', err));
  });
}
</script>
</body>
</html>
