function OnbSwipe({dir,label,color}){
  const arrows={'right':'→','left':'←','up':'↑'};
  const colors={'right':'#30d158','left':'#ff453a','up':'#8e8e93'};
  return <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0'}}>
    <div style={{width:36,height:36,borderRadius:11,background:(colors[dir]||'#888')+'22',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>

    </div>
    <span style={{fontSize:14,color:'rgba(255,255,255,.75)',lineHeight:1.4}}>{label}</span>
  </div>;
}

function OnbCard({bg,children}){
  return <div style={{background:bg||'rgba(255,255,255,.07)',borderRadius:20,padding:'16px 18px',marginBottom:10}}>{children}</div>;
}

          <div style={{fontSize:15,fontWeight:700,color:'#72aad8',marginBottom:10}}>Как учить</div>
          <OnbSwipe dir="right" label="Знаю - карта поднимается на уровень"/>
          <OnbSwipe dir="left" label="Не знаю - вернётся через 1 минуту"/>
          <div style={{fontSize:13,color:'rgba(255,255,255,.45)',marginTop:8}}>Тап по карточке → перевернуть{'\n'}Система сама считает когда повторять: 1мин → 10мин → 1день → 1нед → 1мес → 6мес</div>

        <button onClick={onDone} style={{padding:'6px 14px',borderRadius:20,border:'1px solid rgba(255,255,255,.15)',background:'rgba(255,255,255,.08)',color:'rgba(255,255,255,.5)',fontSize:13,cursor:'pointer'}}>Пропустить</button>

/* ===== ROOT ===== */
const TABS=[
  {id:0,l:'Дела',Icon:({c,s})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="17" rx="3"/><path d="M8 9l2.5 2.5L15 8"/><line x1="8" y1="14.5" x2="16" y2="14.5" opacity=".4"/></svg>},
  {id:1,l:'Привычки',Icon:({c,s})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2C9 2 6 5 6 9c0 5 6 11 6 11s6-6 6-11c0-4-3-7-6-7z"/><circle cx="12" cy="9" r="2" fill={c} stroke="none" opacity=".7"/></svg>},
  {id:2,l:'Повторение',Icon:({c,s})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-5.5"/><circle cx="12" cy="12" r="3" fill={c} stroke="none" opacity=".5"/></svg>},
];

function App(){
  const[tab,setTab]=useState(0);
  const[onboarding,setOnboarding]=useState(()=>!localStorage.getItem('onb2'));
  const[dark,setDark]=useState(()=>{const s=localStorage.getItem('dm');if(s!=null)return s==='1';return window.matchMedia('(prefers-color-scheme: dark)').matches;});
  const[vw,setVw]=useState(()=>window.innerWidth);
  const[tasks,setTasks]=useState(()=>ld('tk9',[]));
  const[lists,setLists]=useState(()=>ld('tl9',[]));
  const[habits,setHabits]=useState(()=>{const raw=ld('hb9',[]);const d90=mkDates(90);return raw.map(h=>ensDays(h,d90));});

  useEffect(()=>{sv('tk9',tasks);},[tasks]);
  useEffect(()=>{sv('tl9',lists);},[lists]);
  useEffect(()=>{sv('hb9',habits);},[habits]);
  useEffect(()=>{localStorage.setItem('dm',dark?'1':'0');document.body.style.background=dark?'#000':'#f2f2f7';},[dark]);
  useEffect(()=>{
    const onResize=()=>setVw(window.innerWidth);
    window.addEventListener('resize',onResize);
    return()=>window.removeEventListener('resize',onResize);
  },[]);

  // в”Ђв”Ђ Midnight reset в”Ђв”Ђ
  // Logic:
  //   вЂў Recurring tasks (daily/weekly/etc) в†’ reset done:false so they reappear
  //   вЂў Done non-recurring tasks в†’ removed (они ушли, день закончился)
  //   вЂў Undone tasks of any kind в†’ carry over as-is
  //   вЂў Habits в†’ ensureDays runs again with fresh 90-day window (today shifts forward)
  useEffect(()=>{
    function doReset(){
      const stored=ld('lastResetDate','');
      const today=tod();
      if(stored===today)return; // already reset today
      sv('lastResetDate',today);

      // Reset tasks вЂ” check each recurrence period individually
      setTasks(ts=>{
        const now=new Date();
        return ts
          .map(t=>{
            if(t.recur==='none') return t; // no recurrence вЂ” leave as-is
            if(!t.done) return t;           // not done yet вЂ” no reset needed

            // Check if enough time has passed since it was last done
            const lastDone=t.lastDone?new Date(t.lastDone):null;
            if(!lastDone) return {...t,done:false,lastDone:null};

            const daysDiff=Math.floor((now-lastDone)/(1000*60*60*24));
            let shouldReset=false;
            if(t.recur==='daily')   shouldReset=daysDiff>=1;
            if(t.recur==='weekly')  shouldReset=daysDiff>=7;
            if(t.recur==='monthly') shouldReset=now.getMonth()!==lastDone.getMonth()||now.getFullYear()!==lastDone.getFullYear();
            if(t.recur==='yearly')  shouldReset=now.getFullYear()!==lastDone.getFullYear();

            return shouldReset?{...t,done:false,lastDone:null}:t;
          })
          .filter(t=>!t.done); // remove completed non-recurring tasks
      });

      // Refresh habits window (shift the 30/90-day strip to include new today)
      setHabits(hs=>{
        const d90=mkDates(90);
        return hs.map(h=>ensDays(h,d90));
      });
    }

    doReset(); // check on mount / tab focus

    // Re-check when tab becomes visible (user opens app after midnight)
    function onVisible(){if(document.visibilityState==='visible')doReset();}
    document.addEventListener('visibilitychange',onVisible);

    // Schedule timer to fire exactly at next midnight
    function schedMidnight(){
      const now=new Date();
      const ms=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,0,0,0)-now;
      return setTimeout(()=>{doReset();schedMidnight();},ms+500); // +500ms buffer
    }
    const timer=schedMidnight();

    return ()=>{
      document.removeEventListener('visibilitychange',onVisible);
      clearTimeout(timer);
    };
  },[]);

  function go(id){
    if(id===tab)return;
    setTab(id);
  }
  function convertToHabit(id){
    const task=tasks.find(t=>t.id===id);if(!task)return;
    const d90=mkDates(90);
    setHabits(hs=>[ensDays({id:Date.now(),text:task.text,notes:task.notes||'',colorIdx:hs.length%6,days:[],totalReps:0},d90),...hs]);
    setTasks(ts=>ts.filter(t=>t.id!==id));
    go(1);
  }

  const T=dark?DT:LT;
  const ui={isPhone:vw<=520,sidePad:vw<=520?10:16};
  return <Cx.Provider value={{dark,T,ui}}>
    <div style={{height:'100dvh',display:'flex',flexDirection:'column',background:T.bg,overflow:'hidden',transition:'background .3s',color:T.text}}>
      {onboarding&&<Onboarding onDone={()=>{localStorage.setItem('onb2','1');setOnboarding(false);}}/>}
      <div style={{flex:1,overflow:'hidden',maxWidth:ui.isPhone?'100%':600,width:'100%',margin:'0 auto',padding:'0 '+ui.sidePad+'px',position:'relative'}}>
        {/* All tabs always mounted вЂ” state preserved. Slide between them via CSS. */}
        {[0,1,2].map(tid=>{
          const active=tid===tab;
          // inactive tabs sit to the left or right depending on their id vs active tab
          const offset=active?0:(tid<tab?-100:100);
          return <div key={tid} style={{
            position:'absolute',inset:0,padding:'0 '+ui.sidePad+'px',
            display:'flex',flexDirection:'column',
            opacity:active?1:0,
            pointerEvents:active?'auto':'none',
            transform:'translateX('+offset+'%)',
            transition:'transform .34s cubic-bezier(.4,0,.2,1), opacity .28s cubic-bezier(.4,0,.2,1)',
          }}>
            {tid===0&&<DailyTab tasks={tasks} setTasks={setTasks} lists={lists} setLists={setLists} convertToHabit={convertToHabit} dark={dark} onToggleDark={()=>setDark(d=>!d)}/>}
            {tid===1&&<HabitsTab habits={habits} setHabits={setHabits} dark={dark} onToggleDark={()=>setDark(d=>!d)}/>}
            {tid===2&&<SRTab dark={dark} onToggleDark={()=>setDark(d=>!d)}/>}
          </div>;
        })}
      </div>
      {/* Tab bar - 3 items only */}
      <div style={{flexShrink:0,background:T.tb,backdropFilter:BL,WebkitBackdropFilter:BL,borderTop:'0.5px solid '+T.sep}}>
        <div style={{maxWidth:ui.isPhone?'100%':600,margin:'0 auto',display:'flex',alignItems:'center',padding:ui.isPhone?'10px 8px 12px':'8px 12px 10px'}}>
          <div style={{flex:1,display:'flex',gap:3,background:dark?'rgba(255,255,255,.06)':'rgba(0,0,0,.04)',borderRadius:16,padding:3}}>
            {TABS.map(t=>{
              const act=tab===t.id;
              return <button key={t.id} onClick={()=>go(t.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:ui.isPhone?4:3,padding:ui.isPhone?'9px 0 8px':'7px 0 6px',borderRadius:12,border:'none',cursor:'pointer',background:act?T.card:'transparent',boxShadow:act?'0 1px 6px '+T.sh:'none',transition:'all .22s cubic-bezier(.34,1.2,.64,1)',color:act?T.ton:T.toff}}>
                <t.Icon c={act?T.ton:T.toff} s={ui.isPhone?22:20}/>
                <span style={{fontSize:ui.isPhone?11:10,fontWeight:act?700:500,letterSpacing:.1}}>{t.l}</span>
              </button>;
            })}
          </div>
        </div>
      </div>
    </div>
  </Cx.Provider>;
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
